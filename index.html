<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMC HR Ops Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:DM Sans,sans-serif;background:#F4F6FB;color:#0D2B6E;min-height:100vh}
nav{background:#0D2B6E;padding:0 28px 0 0;display:flex;align-items:center;justify-content:space-between;height:68px;position:sticky;top:0;z-index:100}
.nlogo{display:flex;align-items:center;justify-content:center;width:240px;flex-shrink:0;padding-left:16px}

.nsub{font-size:11px;color:rgba(255,255,255,0.55);font-weight:400}
.nbrand{display:flex;align-items:center;gap:0}
.homebtn{width:32px;height:32px;border-radius:8px;border:1px solid #DDE3EE;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#4A5568}
.homebtn:hover{background:#EEF2FB}
.layout{display:grid;grid-template-columns:256px 1fr;min-height:calc(100vh - 54px)}
.sidebar{background:#F8FAFF;border-right:1px solid #DDE3EE;display:flex;flex-direction:column}
.sbhead{padding:13px 13px 10px;border-bottom:1px solid #DDE3EE}
.sbrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sblbl{font-size:10px;font-weight:700;color:#7A8499;text-transform:uppercase;letter-spacing:.07em}
.sbcnt{font-size:11px;color:#7A8499;background:#EEF2FB;padding:2px 7px;border-radius:10px}
.srch{width:100%;padding:7px 10px;border:1px solid #DDE3EE;border-radius:10px;font-family:DM Sans,sans-serif;font-size:13px;color:#0D2B6E;background:#F4F6FB;outline:none}
.srch::placeholder{color:#7A8499}
.emplist{flex:1;overflow-y:auto;padding:8px}
.empitem{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;transition:background .12s}
.empitem:hover,.empitem.active{background:#EEF2FB;border-left:3px solid #0D2B6E}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.einfo{flex:1;min-width:0}
.ename{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.erole{font-size:11px;color:#7A8499;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.minibar{height:2px;background:#DDE3EE;border-radius:2px;margin-top:3px;overflow:hidden}
.minifill{height:100%;background:#1D9E75;border-radius:2px}
.epct{font-size:11px;font-weight:500;color:#7A8499;flex-shrink:0;font-family:DM Mono,monospace}
.addbtn{margin:8px;padding:10px;border:1px dashed #C8D2E8;border-radius:10px;background:none;font-family:DM Sans,sans-serif;font-size:13px;color:#4A5568;cursor:pointer;width:calc(100% - 16px);transition:all .15s}
.addbtn:hover{background:#EEF2FB;color:#0D2B6E}
.main{padding:22px;overflow-y:auto}

/* HOME */
.htitle{font-size:22px;font-weight:700;color:#0D2B6E}
.hsub{font-size:13px;color:#4A5568;margin-bottom:20px}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.statcard{background:#fff;border:1px solid #DDE3EE;border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(13,43,110,0.06);display:flex;flex-direction:column}.statcard.met.clickable{cursor:pointer;transition:all .15s}.statcard.met.clickable:hover{background:#F4F6FB;border-color:#C8D2E8;transform:translateY(-1px)}
.statlbl{font-size:10px;font-weight:700;color:#7A8499;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;min-height:30px;display:flex;align-items:flex-start;gap:4px;flex-wrap:wrap;line-height:1.4}
.statval{font-size:28px;font-weight:600;font-family:DM Mono,monospace;color:#0D2B6E;line-height:1;display:block;margin:0;padding:0}
.statval.g{color:#1D9E75;font-size:28px;font-weight:600;font-family:DM Mono,monospace;line-height:1;display:block;margin:0;padding:0}
.statpbar{height:4px;background:#EEF2FB;border-radius:2px;overflow:hidden;margin-top:8px}
.statpfill{height:100%;background:#1D9E75;border-radius:2px}
.sectlbl{font-size:10px;font-weight:700;color:#7A8499;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.typegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:22px}
.typecard{border-radius:14px;padding:14px;border:1px solid transparent;cursor:pointer;transition:transform .15s,box-shadow .15s}.typecard:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.tcname{font-size:12px;font-weight:600;margin-bottom:8px}
.tcval{font-size:24px;font-weight:700;font-family:DM Mono,monospace;margin-bottom:2px}
.tcmeta{font-size:11px;opacity:.7;margin-bottom:8px}
.tcbar{height:3px;border-radius:2px;overflow:hidden}
.tcbarfill{height:100%;border-radius:2px}
.etable{background:#fff;border:1px solid #DDE3EE;border-radius:14px;box-shadow:0 1px 3px rgba(13,43,110,0.05);overflow:hidden}
.etable table{width:100%;border-collapse:collapse;font-size:13px}
.etable th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:#7A8499;text-transform:uppercase;letter-spacing:.05em;background:#EEF2FB;border-bottom:1px solid #DDE3EE}
.etable td{padding:10px 14px;border-bottom:1px solid #DDE3EE}
.etable tr:last-child td{border-bottom:none}
.etable tbody tr:hover td{background:#F4F6FB;cursor:pointer}
.tpill{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.tprow{display:flex;align-items:center;gap:7px}
.tptrack{flex:1;height:4px;background:#EEF2FB;border-radius:2px;overflow:hidden;min-width:50px}
.tpfill{height:100%;background:#1D9E75;border-radius:2px}
.tppct{font-size:11px;font-weight:600;color:#1D9E75;font-family:DM Mono,monospace;min-width:28px}

/* EMP DETAIL */
.ehdr{background:#fff;border:1px solid #DDE3EE;border-radius:14px;padding:18px;margin-bottom:14px}
.ehrow{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.avlg{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.ehname{font-size:16px;font-weight:600}
.ehmeta{font-size:12px;color:#4A5568;margin-top:3px}
.ehacts{display:flex;gap:7px;flex-wrap:wrap;margin-left:auto}
.hbtn{padding:6px 11px;border:1px solid #DDE3EE;border-radius:10px;font-family:DM Sans,sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:#fff;color:#4A5568;display:inline-flex;align-items:center;gap:4px;transition:all .15s;text-decoration:none}
.hbtn:hover{background:#EEF2FB;color:#0D2B6E}
.hbtn.back{background:#EEF2FF;border-color:#0D2B6E44;color:#0D2B6E;font-weight:600}
.hbtn.del{color:#DC2626;border-color:#FECACA}
.hbtn.del:hover{background:#FEF2F2}
.mets{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:12px}
.met{background:#F4F6FB;border-radius:10px;padding:9px 11px}
.metl{font-size:10px;font-weight:700;color:#7A8499;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.metv{font-size:18px;font-weight:600;font-family:DM Mono,monospace;color:#0D2B6E}
.metv.g{color:#1D9E75}
.ptrack{height:4px;background:#EEF2FB;border-radius:3px;overflow:hidden;margin-bottom:4px}
.pbar{height:100%;background:#1D9E75;border-radius:3px;transition:width .4s}
.plbl{font-size:11px;color:#7A8499;font-family:DM Mono,monospace}
.clbadge{display:flex;align-items:center;gap:8px;margin-bottom:13px;padding:9px 12px;border-radius:10px;font-size:13px;font-weight:500}
.clbadgedot{width:8px;height:8px;border-radius:50%}
.phase{margin-bottom:18px}
.phdr{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid #DDE3EE}
.phnm{font-size:10px;font-weight:700;color:#4A5568;text-transform:uppercase;letter-spacing:.07em}
.phprog{flex:1;height:3px;background:#DDE3EE;border-radius:2px;overflow:hidden;max-width:70px}
.phprogf{height:100%;background:#1D9E75;border-radius:2px}
.phct{font-size:10px;padding:2px 7px;border-radius:10px;background:#EEF2FB;color:#7A8499;font-family:DM Mono,monospace}
.task{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;transition:background .1s}
.task:hover{background:#EEF2FB}
.task.done{opacity:.45}
.tcb{width:16px;height:16px;border-radius:4px;border:1.5px solid #C8D2E8;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .15s}
.task.done .tcb{background:#1D9E75;border-color:#1D9E75}
.cksvg{width:10px;height:10px;stroke:#fff;stroke-width:2.5;fill:none;display:none}
.task.done .cksvg{display:block}
.ttxt{font-size:13px;color:#0D2B6E;line-height:1.45}
.task.done .ttxt{text-decoration:line-through;color:#7A8499}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.tago{background:#EFF6FF;color:#2563EB}
.tagl{background:#E1F5EE;color:#065F46}
.tagc{background:#F5F3FF;color:#7C3AED}

/* MODAL */
.movlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.movlay.open{display:flex}
.modbox{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:400px;animation:fadeup .2s ease}
@keyframes fadeup{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.modtitle{font-size:15px;font-weight:600;margin-bottom:16px}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:12px;font-weight:500;color:#4A5568;margin-bottom:4px}
.fld input,.fld select{width:100%;padding:8px 11px;border:1px solid #DDE3EE;border-radius:10px;font-family:DM Sans,sans-serif;font-size:13px;color:#0D2B6E;background:#fff;outline:none}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mbtn{padding:8px 15px;border:1px solid #DDE3EE;border-radius:10px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#4A5568}
.mbtn:hover{background:#EEF2FB}
.mbtn.pri{background:#0D2B6E;color:#fff;border-color:#0D2B6E}
.mbtn.pri:hover{background:#333}
#toasts{position:fixed;bottom:18px;right:18px;z-index:300;display:flex;flex-direction:column;gap:7px}
.toast{padding:11px 15px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:8px;animation:slidein .2s ease;max-width:320px}
@keyframes slidein{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.ok{background:#E1F5EE;color:#065F46;border:1px solid #9FE1CB}
.toast.err{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.emptystate{padding:32px;text-align:center;color:#7A8499;font-size:13px}
.grp-header{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background .12s;user-select:none}
.grp-header:hover{background:#EEF2FB}
.grp-chevron{font-size:10px;color:#7A8499;transition:transform .2s;flex-shrink:0}
.grp-body{overflow:hidden;transition:max-height .25s ease}
.sect-header{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;user-select:none;margin-bottom:6px}
.sect-header:hover .sect-lbl{opacity:.8}
.sect-chevron{font-size:11px;color:#7A8499;transition:transform .2s}
.arch-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;background:#EEF2FB;color:#4A5568}
.completed-emp-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:3px;background:#E1F5EE;border:1px solid #9FE1CB;transition:all .15s}
.completed-emp-row:hover{background:#D1FAE5}
.mark-done-btn{padding:5px 11px;border:1px solid #1D9E75;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;background:#E1F5EE;color:#065F46;transition:all .15s;white-space:nowrap}
.mark-done-btn:hover{background:#1D9E75;color:#fff}
.met.clickable{cursor:pointer;transition:all .15s}
.met.clickable:hover{background:#DDE3EE;transform:translateY(-1px)}
.met.clickable:active{transform:translateY(0)}
.quickpanel{position:fixed;top:0;right:0;width:400px;height:100vh;background:#fff;border-left:1px solid #DDE3EE;z-index:250;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.12);animation:slideright .2s ease}
@keyframes slideright{from{transform:translateX(400px)}to{transform:translateX(0)}}
.qp-head{padding:16px 18px;border-bottom:1px solid #DDE3EE;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.qp-title{font-size:14px;font-weight:600;color:#0D2B6E}
.qp-sub{font-size:11px;color:#7A8499;margin-top:2px}
.qp-close{background:none;border:none;font-size:18px;cursor:pointer;color:#7A8499;padding:0;line-height:1}
.qp-close:hover{color:#0D2B6E}
.qp-body{flex:1;overflow-y:auto;padding:12px}
.qp-section{margin-bottom:14px}
.qp-sect-lbl{font-size:10px;font-weight:700;color:#7A8499;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #EEF2FB}
.qp-task{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:8px;margin-bottom:3px;background:#F4F6FB}
.qp-task-num{font-size:10px;font-weight:700;color:#7A8499;min-width:18px;margin-top:1px;font-family:'DM Mono',monospace}
.qp-task-txt{font-size:12px;color:#0D2B6E;line-height:1.4;flex:1}
.qp-task-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.qp-owner-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:#F4F6FB;margin-bottom:4px}
.qp-owner-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.qp-owner-name{font-size:13px;font-weight:500;color:#0D2B6E;flex:1}
.qp-owner-cnt{font-size:11px;font-family:'DM Mono',monospace;color:#7A8499;background:#DDE3EE;padding:2px 7px;border-radius:10px}
.qp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:249}
.doc-section{background:#F4F6FB;border:1px solid #DDE3EE;border-radius:14px;padding:14px;margin-bottom:14px}
.doc-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#fff;border:1px solid #DDE3EE;border-radius:8px;margin-bottom:6px}
.doc-icon{width:32px;height:32px;border-radius:8px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.doc-name{flex:1;font-size:13px;font-weight:500;color:#0D2B6E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-date{font-size:11px;color:#7A8499}
.doc-btns{display:flex;gap:5px}
.doc-btn{padding:4px 9px;border:1px solid #DDE3EE;border-radius:6px;font-size:11px;cursor:pointer;background:#fff;color:#4A5568;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.doc-btn:hover{background:#EEF2FB}
.doc-btn.primary{background:#0D2B6E;color:#fff;border-color:#0D2B6E}
.doc-btn.primary:hover{background:#333}
.doc-upload-area{border:2px dashed #C8D2E8;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:8px}
.doc-upload-area:hover{border-color:#7A8499;background:#EEF2FB}
.doc-upload-area input{display:none}
.task-comment{width:100%;padding:5px 8px;border:1px solid #DDE3EE;border-radius:6px;font-family:DM Sans,sans-serif;font-size:12px;color:#0D2B6E;resize:vertical;outline:none;line-height:1.5;transition:border-color .15s;box-sizing:border-box}
.task-comment:focus{border-color:#C8D2E8}
.task-comment::placeholder{color:#7A8499}
.add-comment-btn{font-size:10px;color:#7A8499;background:none;border:none;cursor:pointer;padding:2px 0;margin-top:2px;font-family:DM Sans,sans-serif;text-decoration:underline}
.add-comment-btn:hover{color:#4A5568}
.comment-bubble{border-radius:6px;padding:6px 8px;font-size:11px;margin-top:5px;line-height:1.4;display:flex;align-items:flex-start}
.comment-bubble.overdue-comment{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.comment-bubble.info-comment{background:#F0F9FF;border:1px solid #BAE6FD;color:#0C4A6E}
.grplbl{font-size:10px;font-weight:700;color:#7A8499;text-transform:uppercase;letter-spacing:.07em;padding:10px 10px 4px}
.grpdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.task-meta{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap}
.task-owner{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#0D2B6E}
.task-owner-av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.task-deadline{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:500}
.task-deadline.ok{background:#E1F5EE;color:#065F46}
.task-deadline.soon{background:#FFFBEB;color:#92400E}
.task-deadline.overdue{background:#FEF2F2;color:#DC2626;font-weight:700}
.task-deadline.none{background:#EEF2FB;color:#7A8499}
.dl-picker{border:none;background:transparent;font-family:DM Sans,sans-serif;font-size:11px;color:#4A5568;cursor:pointer;padding:0;outline:none}
.assign-input{border:none;background:transparent;font-family:DM Sans,sans-serif;font-size:11px;color:#0D2B6E;font-weight:600;outline:none;width:90px;cursor:pointer}
.assign-input::placeholder{color:#7A8499;font-weight:400}
</style>
</head>
<body>

<nav>

// -- STATE --
var emps = {};
var docs = {};
var archived = {};
var deletedEmps = {};
var DEL_SK = "imc_obt_del_v1";
var selectedId = null;
var SK = "imc_obt_v1";
var DOCS_SK = "imc_obt_docs_v2";
var ARCH_SK = "imc_obt_arch_v1";
var VER_SK  = "imc_obt_ver_v1";
var checklistVersions = {};
var pendingUpdates = {};

function fingerprintChecklist(type) {
  var phases = CHECKLISTS[type]||[]; var ids = [];
  phases.forEach(function(ph){ ph.tasks.forEach(function(t){ ids.push(t.id); }); });
  return ids.join("|") + "|" + ids.length;
}
function detectChecklistChanges() {
  pendingUpdates = {};
  TYPES.forEach(function(type) {
    var current = fingerprintChecklist(type);
    var stored  = checklistVersions[type] || "";
    if (stored && stored !== current) {
      Object.keys(emps).forEach(function(id) {
        var emp = emps[id];
        if (emp.type === type && emp.checklistFingerprint !== current) {
          pendingUpdates[id] = { type:type, empName:emp.name };
        }
      });
    }
  });
  return Object.keys(pendingUpdates).length > 0;
}
function saveVersions() {
  var v = {}; TYPES.forEach(function(type){ v[type] = fingerprintChecklist(type); });
  try { localStorage.setItem(VER_SK, JSON.stringify(v)); } catch(e) {}
}

function loadData() {
  try { var s = localStorage.getItem(SK); if (s) emps = JSON.parse(s); } catch(e) {}
  try { var d = localStorage.getItem(DOCS_SK); if (d) { var p = JSON.parse(d); docs = (p && typeof p === "object" && !Array.isArray(p)) ? p : {}; } } catch(e) {}
  try { var a = localStorage.getItem(ARCH_SK); if (a) archived = JSON.parse(a); } catch(e) {}
  try { var dl = localStorage.getItem(DEL_SK); if (dl) deletedEmps = JSON.parse(dl); } catch(e) {}
  try { var v = localStorage.getItem(VER_SK); if (v) checklistVersions = JSON.parse(v); } catch(e) {}
}
function saveData() { try { localStorage.setItem(SK, JSON.stringify(emps)); } catch(e) {} }
function saveArchived() { try { localStorage.setItem(ARCH_SK, JSON.stringify(archived)); } catch(e) {} }
function saveDeleted()  { try { localStorage.setItem(DEL_SK,  JSON.stringify(deletedEmps));  } catch(e) {} }
function saveDocs() { try { localStorage.setItem(DOCS_SK, JSON.stringify(docs)); } catch(e) {} }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function initials(name) { return String(name||"").trim().split(/\s+/).slice(0,2).map(function(w){return w[0]||"";}).join("").toUpperCase()||"?"; }
function avColor(id) { var h=0; var s=String(id||""); for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))&0xfffffff; return AV_PAL[h%AV_PAL.length]; }
function allTasks(type) { var r=[]; var phases=CHECKLISTS[type]||[]; for(var i=0;i<phases.length;i++) for(var j=0;j<phases[i].tasks.length;j++) r.push(phases[i].tasks[j]); return r; }
function doneCount(emp) { var tasks=allTasks(emp.type); var ch=emp.checks||{}; var n=0; for(var i=0;i<tasks.length;i++) if(ch[tasks[i].id]) n++; return n; }
function pct(emp) { var tot=allTasks(emp.type).length; return tot?Math.round(doneCount(emp)/tot*100):0; }
function val(id) { var el=document.getElementById(id); return el?el.value.trim():""; }
function showToast(msg, type) {
  var el=document.createElement("div"); el.className="toast "+(type||"ok"); el.textContent=msg;
  document.getElementById("toasts").appendChild(el); setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},4000);
}
function renderSidebar() {
  var q = document.getElementById("searchBox").value.toLowerCase();
  var allIds = Object.keys(emps);
  var ids = allIds.filter(function(id){
    return !q || emps[id].name.toLowerCase().indexOf(q) !== -1;
  });
  document.getElementById("empCount").textContent = allIds.length;
  var el = document.getElementById("empList");
  if (!ids.length) {
    el.innerHTML = '<div class="emptystate">' + (q ? "No results" : "No employees yet") + '</div>';
    return;
  }
  var html = "";
  for (var t = 0; t < TYPES.length; t++) {
    var type = TYPES[t];
    var col = TYPE_COLORS[type];
    var groupIds = ids.filter(function(id){ return emps[id].type === type; });
    if (!groupIds.length) continue;
    var groupKey = "sbgrp_" + type.replace(/\s+/g,"_");
    var isOpen = localStorage.getItem(groupKey) !== "0";
    html += '<div>'
      + '<div class="grp-header" data-grpkey="' + groupKey + '">'
      + '<div style="display:flex;align-items:center;gap:6px">'
      + '<span class="grpdot" style="background:' + col.dot + '"></span>'
      + '<span style="font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.07em">' + type.replace("International ","Intl. ") + '</span>'
      + '<span style="font-size:10px;color:#9E9B94;font-weight:400">(' + groupIds.length + ')</span>'
      + '</div>'
      + '<span class="grp-chevron" style="transform:' + (isOpen ? '' : 'rotate(-90deg)') + '">&#9660;</span>'
      + '</div>'
      + '<div class="grp-body" style="max-height:' + (isOpen ? '2000px' : '0') + ';overflow:hidden">';
    for (var i = 0; i < groupIds.length; i++) {
      var id = groupIds[i];
      var e = emps[id];
      var p = pct(e);
      var a = avColor(id);
      var active = selectedId === id ? " active" : "";
      html += '<div class="empitem' + active + '" data-id="' + id + '">'
        + '<div class="av" style="background:' + a.bg + ';color:' + a.c + '">' + initials(e.name) + '</div>'
        + '<div class="einfo">'
        + '<div class="ename">' + e.name + '</div>'
        + '<div class="erole">' + (e.role || '—') + '</div>'
        + '<div class="minibar"><div class="minifill" style="width:' + p + '%"></div></div>'
        + '</div>'
        + '<div class="epct">' + p + '%</div>'
        + '</div>';
    }
    html += '</div></div>';
  }
  el.innerHTML = html;
  // Wire employee clicks
  var items = el.querySelectorAll(".empitem");
  for (var j = 0; j < items.length; j++) {
    items[j].addEventListener("click", function(){
      showEmployee(this.getAttribute("data-id"));
    });
  }
  // Wire group collapse toggles
  var headers = el.querySelectorAll(".grp-header");
  for (var h = 0; h < headers.length; h++) {
    headers[h].addEventListener("click", function(){
      var key = this.getAttribute("data-grpkey");
      var body = this.nextElementSibling;
      var chevron = this.querySelector(".grp-chevron");
      var isOpen = body.style.maxHeight !== "0px" && body.style.maxHeight !== "0";
      body.style.maxHeight = isOpen ? "0" : "2000px";
      if (chevron) chevron.style.transform = isOpen ? "rotate(-90deg)" : "";
      localStorage.setItem(key, isOpen ? "0" : "1");
    });
  }
}
function closeQuickPanel() {
  var p=document.getElementById("quickPanel"); var o=document.getElementById("qpOverlay");
  if(p&&p.parentNode)p.parentNode.removeChild(p); if(o&&o.parentNode)o.parentNode.removeChild(o);
}
function makePanel(title, sub) {

  overlay.addEventListener("click",closeQuickPanel); document.body.appendChild(overlay);

  panel.innerHTML='<div style="padding:16px 18px;border-bottom:1px solid #E4E1DA;display:flex;align-items:center;justify-content:space-between;flex-shrink:0"><div><div style="font-size:14px;font-weight:600">'+title+'</div><div style="font-size:11px;color:#9E9B94;margin-top:2px">'+sub+'</div></div><button id="qpCloseBtn" style="background:none;border:none;font-size:18px;cursor:pointer;color:#9E9B94;padding:0;line-height:1">&#10005;</button></div><div style="flex:1;overflow-y:auto;padding:12px" id="qpBody"></div>';
  document.body.appendChild(panel);
  var cb=panel.querySelector?panel.querySelector("#qpCloseBtn"):null; if(cb)cb.addEventListener("click",closeQuickPanel);
  return panel;
}
function wireToggles(panel) {
  var togs=panel.querySelectorAll?panel.querySelectorAll(".qp-emp-toggle"):[];
  for(var i=0;i<togs.length;i++) togs[i].addEventListener("click",function(){var tb=this.nextElementSibling;var ch=this.querySelector?this.querySelector(".qp-chevron"):null;if(tb){var open=tb.style.display!=="none";tb.style.display=open?"none":"block";if(ch)ch.style.transform=open?"":"rotate(180deg)";}});
}

function showDashRemainingPanel() {
  closeQuickPanel();
  var ids=Object.keys(emps);
  var totalRem=ids.reduce(function(s,id){return s+(allTasks(emps[id].type).length-doneCount(emps[id]));},0);
  var panel=makePanel("Remaining tasks",totalRem+" tasks pending &middot; click to expand");

// Resolve a pending update for one employee
// keepOld=false means switch to new checklist (preserving matching completed task IDs)
// keepOld=true means stamp current checklist as their personal version (no change needed)
function resolveUpdate(id, switchToNew) {
  var e = emps[id]; if (!e) return;
  if (switchToNew) {
    // Preserve completed tasks that have same ID in new checklist
    var newTaskIds = {};
    allTasks(e.type).forEach(function(t){ newTaskIds[t.id] = true; });
    var newChecks = {};
    Object.keys(e.checks||{}).forEach(function(tid){
      if (newTaskIds[tid] && e.checks[tid]) newChecks[tid] = true;
    });
    e.checks = newChecks;
  }
  // Stamp the employee with current version so they won't be flagged again
  e.checklistFingerprint = fingerprintChecklist(e.type);
  saveData();
}

// Helper: get task count from a fingerprint string (last segment after last |)
function allTasksFromFingerprint(type) {
  return allTasks(type); // just use current; old count is cosmetic only
}

function infoField(label, value) {
  if (!value) return "";
  return "<div style=\"min-width:100px\"><div style=\"font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px\">" + label + "</div>"
    + "<div style=\"font-size:13px;color:#0D2B6E;font-weight:500\">" + value + "</div></div>";
}

function buildEmpInfo(e) {
  var fields = "";
  if (e.type === "Local Onboarding") {
    fields += infoField("Position", e.role);
    fields += infoField("Department", e.dept);
    fields += infoField("Date of joining", e.doj);
  } else if (e.type === "International Incoming") {
    fields += infoField("Position", e.role);
    fields += infoField("Manager", e.manager);
    fields += infoField("Team", e.team);
    fields += infoField("Transfer date", e.doj);
    fields += infoField("Transfer type", e.transferType);
    if (e.tempEnd) fields += infoField("Assignment end date", e.tempEnd);
    if (e.assignmentDuration) fields += infoField("Assignment duration", e.assignmentDuration);
  } else if (e.type === "Local Offboarding") {
    fields += infoField("Last working day", e.lwd || e.doj);
    fields += infoField("Termination date", e.termDate);
    fields += infoField("Garden leave", e.gardenLeave && e.gardenLeave !== "No" ? e.gardenLeave : "No");
    fields += infoField("Non-compete", e.nonCompete && e.nonCompete !== "No" ? e.nonCompete : "No");
  } else if (e.type === "International Outgoing") {
    fields += infoField("Next position", e.role);
    fields += infoField("Next manager", e.nextManager);
    fields += infoField("Next team", e.team);
    fields += infoField("Transfer date", e.doj);
    fields += infoField("Transfer type", e.transferType);
  } else if (e.type === "Local Transfer Out") {
    fields += infoField("Date of transfer", e.doj);
    fields += infoField("Next position", e.role);
    fields += infoField("Next manager", e.nextManager);
    fields += infoField("Next team", e.team);
    fields += infoField("Transfer type", e.transferType);
    if (e.tempEnd) fields += infoField("Assignment end date", e.tempEnd);
    if (e.assignmentDuration) fields += infoField("Assignment duration", e.assignmentDuration);
  }
  fields += infoField("Checklist type", e.type);
  return fields;
}

function showEmployee(id) {
  var e = emps[id];
  if (!e) { showHome(); return; }
  showNavHome(true);
  selectedId = id;
  renderSidebar();
  var a = avColor(id);
  var col = TYPE_COLORS[e.type] || {bg:"#F0EEE9",c:"#0D2B6E",dot:"#6B6860"};
  var phases = CHECKLISTS[e.type] || [];
  var ch = e.checks || {};
  var d = doneCount(e);
  var tot = allTasks(e.type).length;
  var p = pct(e);
  var ownerSet = {};
  allTasks(e.type).forEach(function(t){ ownerSet[t.own]=1; });
  var owners = Object.keys(ownerSet);

  var html = "<div class=\"ehdr\">"
    + "<div class=\"ehrow\">"
    + "<div class=\"avlg\" style=\"background:" + a.bg + ";color:" + a.c + "\">" + initials(e.name) + "</div>"
    + "<div><div class=\"ehname\">" + e.name + "</div>"
    + "<div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-top:8px\">" + buildEmpInfo(e) + "</div></div>"
    + "<div class=\"ehacts\">"
    + "<button class=\"hbtn\" id=\"exportEmpBtn\" style=\"color:#1D9E75;border-color:#9FE1CB\">&#8681; Export</button>"
    + "<button class=\"hbtn\" id=\"editBtn\">&#9998; Edit</button>"
    + "<button class=\"hbtn back\" id=\"backBtn\">&larr; Back</button>"
    + "<button class=\"hbtn del\" id=\"delBtn\">&#10005; Remove</button>"
    + "</div></div>"
    + "<div class=\"mets\">"
    + "<div class=\"met\"><div class=\"metl\">Total tasks</div><div class=\"metv\">" + tot + "</div></div>"
    + "<div class=\"met\"><div class=\"metl\">Completed</div><div class=\"metv g\">" + d + "</div></div>"
    + "<div class=\"met clickable\" id=\"metRemaining\" title=\"Click to see remaining tasks\"><div class=\"metl\">Remaining &#9656;</div><div class=\"metv\">" + (tot-d) + "</div></div>"

    + "<div class=\"met clickable\" id=\"metOwners\" title=\"Click to see owners\"><div class=\"metl\">Owners &#9656;</div><div class=\"metv\">" + owners.length + "</div></div>"
    + "<div class=\"met\"><div class=\"metl\">Progress</div><div class=\"metv g\">" + p + "%</div></div>"
    + "</div>"
    + "<div class=\"ptrack\"><div class=\"pbar\" style=\"width:" + p + "%\"></div></div>"
    + "<div class=\"plbl\">" + e.type + ": " + d + " of " + tot + " tasks completed</div>"
    + "</div>";

  // Checklist badge
  html += "<div class=\"clbadge\" style=\"background:" + col.bg + ";border:1px solid " + col.dot + "44;color:" + col.c + "\">"
    + "<div class=\"clbadgedot\" style=\"background:" + col.dot + "\"></div>" + e.type + "</div>";

  // Tasks — flat list, no phase grouping
  var today = new Date(); today.setHours(0,0,0,0);
  html += "<div class=\"phase\">";
  for (var ph = 0; ph < phases.length; ph++) {
    var phase = phases[ph];
    for (var tk = 0; tk < phase.tasks.length; tk++) {
      var task = phase.tasks[tk];
      var isDone = !!ch[task.id];
      var tm = (e.taskMeta && e.taskMeta[task.id]) || {};
      var assignee = tm.assignee || task.own;
      var deadline = tm.deadline || "";
      if (!deadline && task.dlOffset !== null && task.dlOffset !== undefined && e.doj) {
        var doj = new Date(e.doj); doj.setDate(doj.getDate() + task.dlOffset);
        deadline = doj.toISOString().slice(0,10);
      }
      var dlClass = "none", dlTxt = "Set deadline";
      if (deadline) {
        var diff = Math.round((new Date(deadline) - today) / 86400000);
        if (diff < 0)      { dlClass = "overdue"; dlTxt = "Overdue by " + Math.abs(diff) + "d"; }
        else if (diff <= 3){ dlClass = "soon";    dlTxt = "Due in " + diff + "d"; }
        else               { dlClass = "ok";      dlTxt = new Date(deadline).toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }
      }
      var comment = tm.comment || "";
      html += "<div class=\"task" + (isDone ? " done" : "") + "\" data-empid=\"" + id + "\" data-taskid=\"" + task.id + "\">"
        + "<div class=\"tcb\"><svg class=\"cksvg\" viewBox=\"0 0 10 8\"><polyline points=\"1,4 3.5,7 9,1\"/></svg></div>"
        + "<div style=\"flex:1;min-width:0\">"
        + "<div class=\"ttxt\">" + task.n + ". " + task.t + "</div>"
        + "<div class=\"task-meta\">"
        + "<div class=\"task-owner\" style=\"display:flex;align-items:center;gap:4px\">"
        + "<svg width=\"11\" height=\"11\" viewBox=\"0 0 16 16\" fill=\"none\" style=\"flex-shrink:0;opacity:.5\"><circle cx=\"8\" cy=\"5\" r=\"3\" stroke=\"#0D2B6E\" stroke-width=\"1.5\"/><path d=\"M2 13c0-3 2-5 6-5s6 2 6 5\" stroke=\"#0D2B6E\" stroke-width=\"1.5\" stroke-linecap=\"round\"/></svg>"
        + "<input class=\"assign-input\" data-empid=\"" + id + "\" data-taskid=\"" + task.id + "\" value=\"" + assignee + "\" placeholder=\"Assign to...\" />"
        + "</div>"
        + "<span class=\"tag tagl\">" + task.tl + "</span>"

        + "<span class=\"task-deadline " + dlClass + "\">"
        + (deadline
            ? dlTxt + (task.dlOffset !== null && task.dlOffset !== undefined && !tm.deadline ? " <span style=\"font-size:9px;opacity:.6\">(D" + (task.dlOffset < 0 ? task.dlOffset : task.dlOffset === 0 ? "" : "+" + task.dlOffset) + ")</span>" : "")
            + " <input type=\"date\" class=\"dl-picker\" data-empid=\"" + id + "\" data-taskid=\"" + task.id + "\" value=\"" + deadline + "\" style=\"width:0;opacity:0;position:absolute\" />"
            : "<input type=\"date\" class=\"dl-picker\" data-empid=\"" + id + "\" data-taskid=\"" + task.id + "\" value=\"\" />")
        + "</span>"
        + "</div>"
        + "<div class=\"comment-bubble" + (dlClass==="overdue" ? " overdue-comment" : " info-comment") + "\" id=\"cbubble_" + id + "_" + task.id + "\" style=\"display:" + (comment ? "flex" : "none") + "\">"
        + "<textarea class=\"task-comment\" rows=\"2\" data-empid=\"" + id + "\" data-taskid=\"" + task.id + "\" placeholder=\"Add a comment or note...\">" + comment + "</textarea>"
        + "</div>"
        + "<button class=\"add-comment-btn\" id=\"cbtn_" + id + "_" + task.id + "\" data-empid=\"" + id + "\" data-taskid=\"" + task.id + "\" style=\"" + (comment ? "display:none" : "") + "\">&#128172; add comment</button>"
        + "</div></div></div>";
    }
  }
  html += "</div>";

    
  // ── CLOSE CHECKLIST SECTION ─────────────────────────────────────────────
  var incompleteTasks = [];
  (CHECKLISTS[e.type]||[]).forEach(function(phase){
    phase.tasks.forEach(function(task){ if (!ch[task.id]) incompleteTasks.push(task); });
  });
  var allDone = incompleteTasks.length === 0;
  var incompCount = incompleteTasks.length;
  var borderCol = allDone ? "#1D9E75" : "#DDE3EE";
  var bgCol     = allDone ? "#F0FDF4" : "#FAFAFA";
  var titleCol  = allDone ? "#065F46" : "#0D2B6E";
  var dotBg     = allDone ? "#1D9E75" : "#D0CCC3";
  var btnBg     = allDone ? "#1D9E75" : "#0D2B6E";
  var incompCount2 = incompCount;
  var titleTxt  = allDone ? "All tasks completed — ready to close"
    : "Close checklist (" + incompCount2 + " task" + (incompCount2!==1?"s":"") + " pending)";
  var subTxt = allDone
    ? "All " + tot + " tasks are done. Close this checklist to move the employee to the completed archive."
    : incompCount2 + " task" + (incompCount2!==1?"s are":" is") + " still pending. A comment is required to close.";
  var btnTxt = allDone ? "&#10003; Mark as completed" : "Close checklist";
  html += '<div id="completeEmpSection" style="margin-top:28px;border:2px solid ' + borderCol + ';border-radius:16px;padding:20px;background:' + bgCol + '">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:' + (allDone?'0':'14px') + '">'
    + '<div style="width:32px;height:32px;border-radius:50%;background:' + dotBg + ';display:flex;align-items:center;justify-content:center;flex-shrink:0">'
    + '<svg width="14" height="12" viewBox="0 0 14 12" fill="none"><polyline points="1,6 5,10 13,2" stroke="white" stroke-width="2.5"/></svg></div>'
    + '<div style="flex:1"><div style="font-size:14px;font-weight:600;color:' + titleCol + '">' + titleTxt + '</div>'
    + '<div style="font-size:11px;color:#9E9B94;margin-top:2px">' + subTxt + '</div></div></div>';
  if (!allDone) {
    html += '<div style="margin-bottom:12px">'
      + '<label style="font-size:12px;font-weight:600;color:#DC2626;display:block;margin-bottom:5px">Closing comment <span style="color:#DC2626">*</span> <span style="font-weight:400;color:#9E9B94">(required when tasks are incomplete)</span></label>'
      + '<textarea id="closeComment" rows="3" placeholder="e.g. Employee resigned — remaining tasks waived by manager..." style="width:100%;padding:10px 12px;border:1.5px solid #DDE3EE;border-radius:10px;font-family:DM Sans,sans-serif;font-size:13px;resize:vertical;box-sizing:border-box"></textarea>'
      + '</div>';
  }
  html += '<button id="markCompleteBtn" style="width:100%;padding:12px;border:none;border-radius:10px;background:' + btnBg + ';color:#fff;font-family:DM Sans,sans-serif;font-size:13px;font-weight:600;cursor:pointer">' + btnTxt + '</button>'
    + '</div>';

  document.getElementById("mainArea").innerHTML = html;

  var backBtn = document.getElementById("backBtn"); if (backBtn) backBtn.addEventListener("click", function(){ showHome(); });
  var exportEmpBtn = document.getElementById("exportEmpBtn"); if (exportEmpBtn) exportEmpBtn.addEventListener("click", function(){ exportEmployee(id); });
  var editBtn = document.getElementById("editBtn"); if (editBtn) editBtn.addEventListener("click", function(){ showEditModal(id); });
  var delBtn = document.getElementById("delBtn");
  if (delBtn) delBtn.addEventListener("click", function(){ deleteEmployee(id); });
  var mcBtn = document.getElementById("markCompleteBtn");
  if (mcBtn) {
    mcBtn.addEventListener("click", function(){
      var e2 = emps[id]; if (!e2) return;
      var allDone2 = doneCount(e2) === allTasks(e2.type).length;
      if (!allDone2) {
        var commentEl = document.getElementById("closeComment");
        var comment = commentEl ? commentEl.value.trim() : "";
        if (!comment) {
          if (commentEl) { commentEl.style.border = "1.5px solid #DC2626"; commentEl.focus(); }
          showToast("Please add a closing comment before completing.", "err");
          return;
        }
        if (!e2.taskMeta) e2.taskMeta = {};
        e2.taskMeta["__closeComment"] = comment;
        saveData();
      }
      markEmployeeComplete(id);
    });
  }
  var mr = document.getElementById("metRemaining");
  if (mr) mr.addEventListener("click", function(){ showRemainingPanel(id); });
  var mo = document.getElementById("metOwners");
  if (mo) mo.addEventListener("click", function(){ showOwnersPanel(id); });

  // Wire task checkboxes
  var taskEls = document.querySelectorAll(".task[data-empid]");
  for (var te = 0; te < taskEls.length; te++) {
    taskEls[te].addEventListener("click", function(ev){
      if (ev.target.classList.contains("assign-input") || ev.target.classList.contains("dl-picker") || ev.target.classList.contains("task-comment") || ev.target.classList.contains("add-comment-btn")) return;
      toggleTask(this.getAttribute("data-empid"), this.getAttribute("data-taskid"));
    });
  }
  // Wire deadline pickers
  var dlPickers = document.querySelectorAll(".dl-picker");
  for (var dp = 0; dp < dlPickers.length; dp++) {
    dlPickers[dp].addEventListener("change", function(ev){
      ev.stopPropagation();
      var eid = this.getAttribute("data-empid"); var tid = this.getAttribute("data-taskid");
      if (!emps[eid].taskMeta) emps[eid].taskMeta = {};
      if (!emps[eid].taskMeta[tid]) emps[eid].taskMeta[tid] = {};
      emps[eid].taskMeta[tid].deadline = this.value;
      saveData(); showEmployee(eid);
    });
  }
  // Wire assignee inputs
  var assignInputs = document.querySelectorAll(".assign-input");
  for (var ai = 0; ai < assignInputs.length; ai++) {
    assignInputs[ai].addEventListener("change", function(ev){
      ev.stopPropagation();
      var eid = this.getAttribute("data-empid"); var tid = this.getAttribute("data-taskid");
      if (!emps[eid].taskMeta) emps[eid].taskMeta = {};
      if (!emps[eid].taskMeta[tid]) emps[eid].taskMeta[tid] = {};
      emps[eid].taskMeta[tid].assignee = this.value.trim();
      saveData(); showEmployee(eid);
    });
    assignInputs[ai].addEventListener("click", function(ev){ ev.stopPropagation(); });
  }
  // Wire add-comment buttons
  var addCommentBtns = document.querySelectorAll(".add-comment-btn");
  for (var ab = 0; ab < addCommentBtns.length; ab++) {
    addCommentBtns[ab].addEventListener("click", function(ev){
      ev.stopPropagation();
      showCommentBox(this, this.getAttribute("data-empid"), this.getAttribute("data-taskid"));
      this.style.display = "none";
    });
  }
  // Wire comment textareas
  var commentEls = document.querySelectorAll(".task-comment");
  for (var ce = 0; ce < commentEls.length; ce++) {
    commentEls[ce].addEventListener("change", function(ev){
      ev.stopPropagation();
      var eid = this.getAttribute("data-empid"); var tid = this.getAttribute("data-taskid");
      if (!emps[eid].taskMeta) emps[eid].taskMeta = {};
      if (!emps[eid].taskMeta[tid]) emps[eid].taskMeta[tid] = {};
      emps[eid].taskMeta[tid].comment = this.value.trim();
      saveData();
    });
    commentEls[ce].addEventListener("click", function(ev){ ev.stopPropagation(); });
  }
}

function toggleTask(empId, taskId) {
  if (!emps[empId]) return;
  if (!emps[empId].checks) emps[empId].checks = {};
  emps[empId].checks[taskId] = !emps[empId].checks[taskId];
  saveData(); showEmployee(empId);
}

function markEmployeeComplete(id) {
  var e = emps[id]; if (!e) return;
  e.archivedAt = new Date().toISOString();
  archived[id] = JSON.parse(JSON.stringify(e));
  delete emps[id];
  saveData();
  saveArchived();
  selectedId = null;
  showToast(archived[id].name + " moved to Completed archive.", "ok");
  renderSidebar();
  showHome();
}

var _pendingDeleteId = null;
function deleteEmployee(id) {
  var e = emps[id]; if (!e) return;
  _pendingDeleteId = id;
  var bar = document.getElementById("delConfirmBar");
  if (bar) bar.parentNode.removeChild(bar);
  var div = document.createElement("div");
  div.id = "delConfirmBar";
  div.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:9999;background:#DC2626;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;font-family:DM Sans,sans-serif;font-size:14px;box-shadow:0 2px 12px rgba(0,0,0,0.2)";
  div.innerHTML = '<span><strong>Remove ' + e.name + '?</strong> They will be moved to Deleted records for audit.</span>'
    + '<div style="display:flex;gap:10px">'
    + '<button onclick="cancelDeleteEmployee()" style="padding:7px 16px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.5);border-radius:8px;color:#fff;font-family:DM Sans,sans-serif;font-size:13px;cursor:pointer">Cancel</button>'
    + '<button onclick="confirmDeleteEmployee()" style="padding:7px 16px;background:#fff;border:none;border-radius:8px;color:#DC2626;font-family:DM Sans,sans-serif;font-size:13px;font-weight:600;cursor:pointer">&#10005; Confirm Remove</button>'
    + '</div>';
  document.body.appendChild(div);
}
function cancelDeleteEmployee() {
  var bar = document.getElementById("delConfirmBar");
  if (bar) bar.parentNode.removeChild(bar);
  _pendingDeleteId = null;
}
function confirmDeleteEmployee() {
  var bar = document.getElementById("delConfirmBar");
  if (bar) bar.parentNode.removeChild(bar);
  var id = _pendingDeleteId; if (!id) {
 return; }
  var emp = emps[id]; if (!emp) return;
  var empName = emp.name;
  var snapshot = JSON.parse(JSON.stringify(emp));
  snapshot.deletedAt = new Date().toISOString();
  snapshot.doneAtDeletion = doneCount(emp);
  snapshot.totalAtDeletion = allTasks(emp.type).length;
  deletedEmps[id] = snapshot;
  delete emps[id];
  _pendingDeleteId = null;
  saveData();
  saveDeleted();
  selectedId = null;
  showToast(empName + " moved to Deleted records.", "ok");
  renderSidebar();
  showCompletedPage(null);
}

function fld(id, label, type, placeholder, required, value) {
  return "<div class=\"fld\"><label>" + label + "</label>"
    + "<input id=\"" + id + "\" type=\"" + type + "\" placeholder=\"" + placeholder + "\""
    + (value !== undefined && value !== null && value !== "" ? " value=\"" + value + "\"" : "")
    + (required ? " data-required=\"true\"" : "") + "/></div>";

function calcDays(rangeId) {
  var fromEl = document.getElementById(rangeId + "From");
  var toEl = document.getElementById(rangeId + "To");
  var daysEl = document.getElementById(rangeId + "Days");
  var hiddenEl = document.getElementById(rangeId);
  if (!fromEl || !toEl || !daysEl || !hiddenEl) return;
  var from = fromEl.value, to = toEl.value;
  if (from && to) {
    var d1 = new Date(from), d2 = new Date(to);
    var days = Math.round((d2-d1)/86400000);
    if (days >= 0) {
      daysEl.style.display = "block"; daysEl.style.background = "#E1F5EE"; daysEl.style.color = "#065F46";
      daysEl.textContent = "✓ " + days + " day" + (days!==1?"s":"") + "  (" + formatDate(d1) + " – " + formatDate(d2) + ")";
      hiddenEl.value = formatDate(d1) + " – " + formatDate(d2) + " (" + days + " days)";
    } else {
      daysEl.style.display = "block"; daysEl.style.background = "#FEF2F2"; daysEl.style.color = "#DC2626";
      daysEl.textContent = "⚠ End date is before start date"; hiddenEl.value = "";
    }
  } else { daysEl.style.display = "none"; hiddenEl.value = ""; }
}

function formatDate(d) {
  return d.toLocaleDateString("en-GB", {day:"numeric", month:"short", year:"numeric"});
}

function calcAssignmentDuration(startDate, endDate) {
  var daysEl = document.getElementById("mAssignDays");
  if (!daysEl) return;
  if (!startDate || !endDate) { daysEl.style.display = "none"; return; }
  var d1 = new Date(startDate), d2 = new Date(endDate);
  var days = Math.round((d2-d1)/86400000);
  var months = Math.round(days/30.44);
  daysEl.style.display = "block";
  if (days < 0) {
    daysEl.style.background = "#FEF2F2"; daysEl.style.color = "#DC2626";
    daysEl.textContent = "⚠ End date is before transfer date";
  } else {
    daysEl.style.background = "#E1F5EE"; daysEl.style.color = "#065F46";
    daysEl.textContent = "✓ Assignment duration: " + days + " days (" + months + " month" + (months!==1?"s":"") + ")";
  }
}

function addEmp() {
  var type = document.getElementById("mTypeSelect").value;
  if (!type) { alert("Please select a checklist type."); return; }
  var reqFields = document.querySelectorAll("[data-required=\"true\"]");
  var missing = [];
  for (var ri=0; ri<reqFields.length; ri++) {
    reqFields[ri].style.borderColor="";
    if (!reqFields[ri].value.trim()) { reqFields[ri].style.borderColor="#DC2626"; var lbl=reqFields[ri].parentElement?reqFields[ri].parentElement.querySelector("label"):null; missing.push(lbl?lbl.textContent.replace("*","").trim():reqFields[ri].id); }
  }
  var radioGroups={};

  for(var rr=0;rr<allR.length;rr++){ if(!radioGroups[allR[rr].name])radioGroups[allR[rr].name]=false; if(allR[rr].checked)radioGroups[allR[rr].name]=true; }
  for(var grp in radioGroups){ if(!radioGroups[grp]) missing.push("Transfer type"); }
  var selR=document.querySelector("input[name=\"mTransferType\"]:checked");

  if(isTemp){ var te=document.getElementById("mTempEnd"); if(te&&!te.value){te.style.borderColor="#DC2626";missing.push("Temporary assignment end date");} }
  if(missing.length>0){ alert("Please fill in required fields: "+missing.filter(function(v,i,a){return a.indexOf(v)===i;}).join(", ")); return; }
  var nameEl=document.getElementById("mName"); var name=nameEl?nameEl.value.trim():"";
  if(!name){alert("Please enter a name.");return;}
  var id=genId(); var e={name:name,type:type,checks:{},taskMeta:{}};
  var transferTypeEl=document.querySelector("input[name=\"mTransferType\"]:checked");
  var transferType=transferTypeEl?transferTypeEl.value:"";
  if(type==="Local Onboarding"){ e.role=val("mRole");e.dept=val("mDept");e.doj=val("mDOJ");
  }else if(type==="International Incoming"){ e.role=val("mRole");e.manager=val("mManager");e.team=val("mTeam");e.doj=val("mDOJ");e.dept=e.team; if(transferType==="Temporary Transfer"){var r1=val("mTransferRegionII1");e.fromRegion=r1;e.transferType="Temporary Transfer"+(r1?" — from "+r1:"");}else if(transferType==="Permanent Transfer"){var r2=val("mTransferRegionII2");e.fromRegion=r2;e.transferType="Permanent Transfer"+(r2?" — from "+r2:"");} if(isTemp){e.tempEnd=val("mTempEnd");var d1=new Date(e.doj),d2=new Date(e.tempEnd);var days=Math.round((d2-d1)/86400000);e.assignmentDuration=days+" days ("+Math.round(days/30.44)+" months)";}
  }else if(type==="Local Offboarding"){ e.lwd=val("mLWD");e.doj=e.lwd;e.termDate=val("mTermDate"); var glEl=document.getElementById("mGardenLeave");var ncEl=document.getElementById("mNonCompete"); e.gardenLeave=(glEl&&glEl.checked)?(val("mGardenLeaveRange")||"Yes"):"No";e.nonCompete=(ncEl&&ncEl.checked)?(val("mNonCompeteRange")||"Yes"):"No";
  }else if(type==="International Outgoing"){ e.role=val("mNextRole");e.nextManager=val("mNextManager");e.team=val("mNextTeam");e.dept=e.team;e.doj=val("mDOJ"); if(transferType==="Return to Home Region"){var r3=val("mTransferRegion1");e.transferType="Return to Home Region"+(r3?" — "+r3:"");}else if(transferType==="Transfer to Other Region"){var r4=val("mTransferRegion2");e.transferType="Transfer to Other Region"+(r4?" — "+r4:"");}
  }else if(type==="Local Transfer Out"){ e.doj=val("mDOJ");e.role=val("mNextRole");e.nextManager=val("mNextManager");e.team=val("mNextTeam");e.dept=e.team; if(transferType==="Temporary"){var r5=val("mTransferRegionLTO1");e.toRegion=r5;e.transferType="Temporary"+(r5?" — "+r5:"");}else if(transferType==="Permanent"){var r6=val("mTransferRegionLTO2");e.toRegion=r6;e.transferType="Permanent"+(r6?" — "+r6:"");} if(isTemp){e.tempEnd=val("mTempEnd");var d1b=new Date(e.doj),d2b=new Date(e.tempEnd);var daysb=Math.round((d2b-d1b)/86400000);e.assignmentDuration=daysb+" days ("+Math.round(daysb/30.44)+" months)";} }
  emps[id]=e; saveData(); closeModal(); showToast(name+" added successfully.","ok"); showEmployee(id);

function downloadCSV(filename, rows) {
  var csv = rows.map(function(row) {
    return row.map(function(cell) {
      var s = (cell===null||cell===undefined)?"":String(cell);
      if(s.indexOf(",")!==-1||s.indexOf('"')!==-1||s.indexOf("\n")!==-1||s.indexOf("\r")!==-1){ s='"'+s.replace(/"/g,'""')+'"'; }
      return s;
    }).join(",");
  }).join("\r\n");
  var bom = "\uFEFF";
  var blob = new Blob([bom + csv], {type:"text/csv;charset=utf-8;"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}
