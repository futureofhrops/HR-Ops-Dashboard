<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMC HR Ops Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F7F6F3;color:#1A1917;min-height:100vh}
nav{background:#fff;border-bottom:1px solid #E4E1DA;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100}
.nlogo{width:28px;height:28px;background:#1A1917;border-radius:7px;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.ntitle{font-size:14px;font-weight:600;margin-left:9px}
.nsub{font-size:11px;color:#9E9B94;margin-left:4px}
.nbrand{display:flex;align-items:center}
.homebtn{width:32px;height:32px;border-radius:8px;border:1px solid #E4E1DA;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#6B6860}
.homebtn:hover{background:#F0EEE9}
.layout{display:grid;grid-template-columns:256px 1fr;min-height:calc(100vh - 54px)}
.sidebar{background:#fff;border-right:1px solid #E4E1DA;display:flex;flex-direction:column}
.sbhead{padding:13px 13px 10px;border-bottom:1px solid #E4E1DA}
.sbrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sblbl{font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.07em}
.sbcnt{font-size:11px;color:#9E9B94;background:#F0EEE9;padding:2px 7px;border-radius:10px}
.srch{width:100%;padding:7px 10px;border:1px solid #E4E1DA;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:#1A1917;background:#F7F6F3;outline:none}
.srch::placeholder{color:#9E9B94}
.emplist{flex:1;overflow-y:auto;padding:8px}
.empitem{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;transition:background .12s}
.empitem:hover,.empitem.active{background:#F0EEE9}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.einfo{flex:1;min-width:0}
.ename{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.erole{font-size:11px;color:#9E9B94;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.minibar{height:2px;background:#E4E1DA;border-radius:2px;margin-top:3px;overflow:hidden}
.minifill{height:100%;background:#1D9E75;border-radius:2px}
.epct{font-size:11px;font-weight:500;color:#9E9B94;flex-shrink:0;font-family:'DM Mono',monospace}
.addbtn{margin:8px;padding:10px;border:1px dashed #D0CCC3;border-radius:10px;background:none;font-family:'DM Sans',sans-serif;font-size:13px;color:#6B6860;cursor:pointer;width:calc(100% - 16px);transition:all .15s}
.addbtn:hover{background:#F0EEE9;color:#1A1917}
.main{padding:22px;overflow-y:auto}

/* HOME */
.htitle{font-size:20px;font-weight:600;margin-bottom:3px}
.hsub{font-size:13px;color:#6B6860;margin-bottom:20px}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.statcard{background:#fff;border:1px solid #E4E1DA;border-radius:14px;padding:16px}
.statlbl{font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.statval{font-size:28px;font-weight:600;font-family:'DM Mono',monospace;color:#1A1917}
.statval.g{color:#1D9E75}
.statpbar{height:4px;background:#F0EEE9;border-radius:2px;overflow:hidden;margin-top:8px}
.statpfill{height:100%;background:#1D9E75;border-radius:2px}
.sectlbl{font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.typegrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.typecard{border-radius:14px;padding:14px;border:1px solid transparent}
.tcname{font-size:12px;font-weight:600;margin-bottom:8px}
.tcval{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;margin-bottom:2px}
.tcmeta{font-size:11px;opacity:.7;margin-bottom:8px}
.tcbar{height:3px;border-radius:2px;overflow:hidden}
.tcbarfill{height:100%;border-radius:2px}
.etable{background:#fff;border:1px solid #E4E1DA;border-radius:14px;overflow:hidden}
.etable table{width:100%;border-collapse:collapse;font-size:13px}
.etable th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.05em;background:#F0EEE9;border-bottom:1px solid #E4E1DA}
.etable td{padding:10px 14px;border-bottom:1px solid #E4E1DA}
.etable tr:last-child td{border-bottom:none}
.etable tbody tr:hover td{background:#F7F6F3;cursor:pointer}
.tpill{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.tprow{display:flex;align-items:center;gap:7px}
.tptrack{flex:1;height:4px;background:#F0EEE9;border-radius:2px;overflow:hidden;min-width:50px}
.tpfill{height:100%;background:#1D9E75;border-radius:2px}
.tppct{font-size:11px;font-weight:600;color:#1D9E75;font-family:'DM Mono',monospace;min-width:28px}

/* EMP DETAIL */
.ehdr{background:#fff;border:1px solid #E4E1DA;border-radius:14px;padding:18px;margin-bottom:14px}
.ehrow{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.avlg{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.ehname{font-size:16px;font-weight:600}
.ehmeta{font-size:12px;color:#6B6860;margin-top:3px}
.ehacts{display:flex;gap:7px;flex-wrap:wrap;margin-left:auto}
.hbtn{padding:6px 11px;border:1px solid #E4E1DA;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:#fff;color:#6B6860;display:inline-flex;align-items:center;gap:4px;transition:all .15s;text-decoration:none}
.hbtn:hover{background:#F0EEE9;color:#1A1917}
.hbtn.back{background:#F0EEE9;border-color:#D0CCC3;font-weight:500}
.hbtn.del{color:#DC2626;border-color:#FECACA}
.hbtn.del:hover{background:#FEF2F2}
.mets{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:12px}
.met{background:#F7F6F3;border-radius:10px;padding:9px 11px}
.metl{font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.metv{font-size:18px;font-weight:600;font-family:'DM Mono',monospace;color:#1A1917}
.metv.g{color:#1D9E75}
.ptrack{height:4px;background:#F0EEE9;border-radius:3px;overflow:hidden;margin-bottom:4px}
.pbar{height:100%;background:#1D9E75;border-radius:3px;transition:width .4s}
.plbl{font-size:11px;color:#9E9B94;font-family:'DM Mono',monospace}
.clbadge{display:flex;align-items:center;gap:8px;margin-bottom:13px;padding:9px 12px;border-radius:10px;font-size:13px;font-weight:500}
.clbadgedot{width:8px;height:8px;border-radius:50%}
.phase{margin-bottom:18px}
.phdr{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid #E4E1DA}
.phnm{font-size:10px;font-weight:700;color:#6B6860;text-transform:uppercase;letter-spacing:.07em}
.phprog{flex:1;height:3px;background:#E4E1DA;border-radius:2px;overflow:hidden;max-width:70px}
.phprogf{height:100%;background:#1D9E75;border-radius:2px}
.phct{font-size:10px;padding:2px 7px;border-radius:10px;background:#F0EEE9;color:#9E9B94;font-family:'DM Mono',monospace}
.task{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;transition:background .1s}
.task:hover{background:#F0EEE9}
.task.done{opacity:.45}
.tcb{width:16px;height:16px;border-radius:4px;border:1.5px solid #D0CCC3;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .15s}
.task.done .tcb{background:#1D9E75;border-color:#1D9E75}
.cksvg{width:10px;height:10px;stroke:#fff;stroke-width:2.5;fill:none;display:none}
.task.done .cksvg{display:block}
.ttxt{font-size:13px;color:#1A1917;line-height:1.45}
.task.done .ttxt{text-decoration:line-through;color:#9E9B94}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.tago{background:#EFF6FF;color:#2563EB}
.tagl{background:#E1F5EE;color:#065F46}
.tagc{background:#F5F3FF;color:#7C3AED}

/* MODAL */
.movlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.movlay.open{display:flex}
.modbox{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:400px;animation:fadeup .2s ease}
@keyframes fadeup{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.modtitle{font-size:15px;font-weight:600;margin-bottom:16px}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:12px;font-weight:500;color:#6B6860;margin-bottom:4px}
.fld input,.fld select{width:100%;padding:8px 11px;border:1px solid #E4E1DA;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:#1A1917;background:#fff;outline:none}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mbtn{padding:8px 15px;border:1px solid #E4E1DA;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#6B6860}
.mbtn:hover{background:#F0EEE9}
.mbtn.pri{background:#1A1917;color:#fff;border-color:#1A1917}
.mbtn.pri:hover{background:#333}
#toasts{position:fixed;bottom:18px;right:18px;z-index:300;display:flex;flex-direction:column;gap:7px}
.toast{padding:11px 15px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:8px;animation:slidein .2s ease;max-width:320px}
@keyframes slidein{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.ok{background:#E1F5EE;color:#065F46;border:1px solid #9FE1CB}
.toast.err{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.emptystate{padding:32px;text-align:center;color:#9E9B94;font-size:13px}
.grplbl{font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.07em;padding:10px 10px 4px}
.grpdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.task-meta{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap}
.task-owner{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#1A1917}
.task-owner-av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.task-deadline{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:500}
.task-deadline.ok{background:#E1F5EE;color:#065F46}
.task-deadline.soon{background:#FFFBEB;color:#92400E}
.task-deadline.overdue{background:#FEF2F2;color:#DC2626;font-weight:700}
.task-deadline.none{background:#F0EEE9;color:#9E9B94}
.dl-picker{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;color:#6B6860;cursor:pointer;padding:0;outline:none}
.assign-input{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;color:#1A1917;font-weight:600;outline:none;width:90px;cursor:pointer}
.assign-input::placeholder{color:#9E9B94;font-weight:400}
</style>
</head>
<body>

<nav>
  <div class="nbrand">
    <div class="nlogo">OT</div>
    <span class="ntitle">HR Ops Dashboard</span>
    <span class="nsub">· India Operations · IMC</span>
  </div>
  <button class="homebtn" id="homeNavBtn" title="Go to dashboard">⌂</button>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sbhead">
      <div class="sbrow">
        <span class="sblbl">Employees</span>
        <span class="sbcnt" id="empCount">0</span>
      </div>
      <input class="srch" id="searchBox" placeholder="Search employees…"/>
    </div>
    <div class="emplist" id="empList"></div>
    <button class="addbtn" id="addBtn">+ Add new employee</button>
  </aside>
  <main class="main" id="mainArea"></main>
</div>

<div class="movlay" id="modal">
  <div class="modbox" id="modalBox"></div>
</div>
<div id="toasts"></div>

// ── STATE ────────────────────────────────────────────────────────────────────
var emps = {};
var selectedId = null;
var SK = "imc_obt_v1";

function loadData() {
  try { var s = localStorage.getItem(SK); if (s) emps = JSON.parse(s); } catch(e) {}
}
function saveData() {
  try { localStorage.setItem(SK, JSON.stringify(emps)); } catch(e) {}
}
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}
function initials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(function(w){ return w[0] || ""; }).join("").toUpperCase() || "?";
}
function avColor(id) {
  var h = 0;
  for (var i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) & 0xfffffff;
  return AV_PAL[h % AV_PAL.length];
}
function allTasks(type) {
  var result = [];
  var phases = CHECKLISTS[type];
  for (var i = 0; i < phases.length; i++) {
    for (var j = 0; j < phases[i].tasks.length; j++) {
      result.push(phases[i].tasks[j]);
    }
  }
  return result;
}
function doneCount(emp) {
  var tasks = allTasks(emp.type);
  var ch = emp.checks || {};
  var count = 0;
  for (var i = 0; i < tasks.length; i++) {
    if (ch[tasks[i].id]) count++;
  }
  return count;
}
function pct(emp) {
  var total = allTasks(emp.type).length;
  return total ? Math.round(doneCount(emp) / total * 100) : 0;
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  var el = document.createElement("div");
  el.className = "toast " + (type || "ok");
  el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(function(){ el.remove(); }, 4000);
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  var q = document.getElementById("searchBox").value.toLowerCase();
  var allIds = Object.keys(emps);
  var ids = allIds.filter(function(id){
    return !q || emps[id].name.toLowerCase().indexOf(q) !== -1;
  });
  document.getElementById("empCount").textContent = allIds.length;
  var el = document.getElementById("empList");
  if (!ids.length) {
    el.innerHTML = '<div class="emptystate">' + (q ? "No results" : "No employees yet") + '</div>';
    return;
  }
  var html = "";
  // Group by checklist type
  for (var t = 0; t < TYPES.length; t++) {
    var type = TYPES[t];
    var col = TYPE_COLORS[type];
    var groupIds = ids.filter(function(id){ return emps[id].type === type; });
    if (!groupIds.length) continue;
    html += '<div class="grplbl"><span class="grpdot" style="background:' + col.dot + '"></span>' + type.replace("International ","Intl. ") + ' <span style="font-weight:400;opacity:.7">(' + groupIds.length + ')</span></div>';
    for (var i = 0; i < groupIds.length; i++) {
      var id = groupIds[i];
      var e = emps[id];
      var p = pct(e);
      var a = avColor(id);
      var active = selectedId === id ? " active" : "";
      html += '<div class="empitem' + active + '" data-id="' + id + '">'
        + '<div class="av" style="background:' + a.bg + ';color:' + a.c + '">' + initials(e.name) + '</div>'
        + '<div class="einfo">'
        + '<div class="ename">' + e.name + '</div>'
        + '<div class="erole">' + (e.role || '—') + '</div>'
        + '<div class="minibar"><div class="minifill" style="width:' + p + '%"></div></div>'
        + '</div>'
        + '<div class="epct">' + p + '%</div>'
        + '</div>';
    }
  }
  el.innerHTML = html;
  var items = el.querySelectorAll(".empitem");
  for (var j = 0; j < items.length; j++) {
    items[j].addEventListener("click", function(){
      showEmployee(this.getAttribute("data-id"));
    });
  }
}

// ── HOME ─────────────────────────────────────────────────────────────────────
function showHome() {
  selectedId = null;
  renderSidebar();
  var ids = Object.keys(emps);
  var totalEmps = ids.length;
  var totalDone = 0, totalTasks = 0;
  for (var i = 0; i < ids.length; i++) {
    totalDone += doneCount(emps[ids[i]]);
    totalTasks += allTasks(emps[ids[i]].type).length;
  }
  var totalRem = totalTasks - totalDone;
  var ovPct = totalTasks ? Math.round(totalDone / totalTasks * 100) : 0;

  var html = '<div class="htitle">HR Dashboard</div>'
    + '<div class="hsub">India Operations &middot; IMC &middot; All employees at a glance</div>'
    + '<div class="statgrid">'

    + '<div class="statcard"><div class="statlbl">Tasks completed</div><div class="statval g">' + totalDone + '</div></div>'
    + '<div class="statcard"><div class="statlbl">Tasks remaining</div><div class="statval">' + totalRem + '</div></div>'
    + '<div class="statcard"><div class="statlbl">Overall progress</div><div class="statval g">' + ovPct + '%</div>'
    + '<div class="statpbar"><div class="statpfill" style="width:' + ovPct + '%"></div></div></div>'
    + '</div>';

  html += '<div class="sectlbl">By checklist type</div><div class="typegrid">';
  for (var t = 0; t < TYPES.length; t++) {
    var type = TYPES[t];
    var col = TYPE_COLORS[type];
    var empIds = ids.filter(function(id){ return emps[id].type === type; });
    var cnt = empIds.length;
    var d = 0, tot = 0;
    for (var k = 0; k < empIds.length; k++) {
      d += doneCount(emps[empIds[k]]);
      tot += allTasks(type).length;
    }
    var tp = tot ? Math.round(d / tot * 100) : 0;
    html += '<div class="typecard" style="background:' + col.bg + ';border-color:' + col.dot + '44">'
      + '<div class="tcname" style="color:' + col.c + '">' + type + '</div>'
      + '<div class="tcval" style="color:' + col.c + '">' + cnt + '</div>'

        + '<div style="font-size:10px;color:' + col.c + ';opacity:.7;margin-top:4px">' + tp + '% tasks done</div>' : '')
      + '</div>';
  }
  html += '</div>';

  if (ids.length > 0) {
    html += '<div class="sectlbl">All employees</div>'
      + '<div class="etable"><table>'
      + '<thead><tr><th>Employee</th><th>Type</th><th>DOJ</th><th>Progress</th><th>Tasks</th></tr></thead>'
      + '<tbody>';
    for (var r = 0; r < ids.length; r++) {
      var rid = ids[r];
      var re = emps[rid];
      var ra = avColor(rid);
      var rp = pct(re);
      var rd = doneCount(re);
      var rtot = allTasks(re.type).length;
      var rcol = TYPE_COLORS[re.type];
      html += '<tr data-id="' + rid + '">'
        + '<td><div style="display:flex;align-items:center;gap:9px">'
        + '<div style="width:28px;height:28px;border-radius:50%;background:' + ra.bg + ';color:' + ra.c + ';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">' + initials(re.name) + '</div>'
        + '<div><div style="font-weight:500">' + re.name + '</div><div style="font-size:11px;color:#9E9B94">' + (re.role || '—') + '</div></div>'
        + '</div></td>'
        + '<td><span class="tpill" style="background:' + rcol.bg + ';color:' + rcol.c + '">' + re.type.replace("International ","Intl. ") + '</span></td>'
        + '<td style="color:#6B6860;font-size:12px">' + (re.doj || '—') + '</td>'
        + '<td><div class="tprow"><div class="tptrack"><div class="tpfill" style="width:' + rp + '%"></div></div><span class="tppct">' + rp + '%</span></div></td>'
        + '<td style="font-family:\'DM Mono\',monospace;font-size:12px;color:#6B6860">' + rd + '/' + rtot + '</td>'
        + '</tr>';
    }
    html += '</tbody></table></div>';
  } else {
    html += '<div class="emptystate">No employees added yet. Click &ldquo;+ Add new employee&rdquo; to get started.</div>';
  }

  document.getElementById("mainArea").innerHTML = html;

  // wire table row clicks
  var rows = document.querySelectorAll(".etable tbody tr");
  for (var rr = 0; rr < rows.length; rr++) {

    + '<div class="met"><div class="metl">Phases</div><div class="metv">' + phases.length + '</div></div>'
    + '<div class="met"><div class="metl">Owners</div><div class="metv">' + owners.length + '</div></div>'
    + '<div class="met"><div class="metl">Progress</div><div class="metv g">' + p + '%</div></div>'

  // ── TIMELINE ──
  html += '<div style="background:#fff;border:1px solid #E4E1DA;border-radius:14px;padding:16px;margin-bottom:14px">';
  html += '<div style="font-size:12px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px">Timeline</div>';
  for (var pi = 0; pi < phases.length; pi++) {
    var phObj = phases[pi];
    var phDone = 0;
    for (var pti = 0; pti < phObj.tasks.length; pti++) { if (ch[phObj.tasks[pti].id]) phDone++; }
    var phPct = phObj.tasks.length ? Math.round(phDone / phObj.tasks.length * 100) : 0;
    var isComplete = phDone === phObj.tasks.length && phObj.tasks.length > 0;
    var isStarted = phDone > 0 && !isComplete;
    var dotBg = isComplete ? '#1D9E75' : isStarted ? col.dot : '#E4E1DA';
    var lineBg = isComplete ? '#1D9E75' : '#E4E1DA';
    var statusTxt = isComplete ? 'Completed' : isStarted ? 'In progress &mdash; ' + phDone + ' of ' + phObj.tasks.length + ' tasks done' : 'Not started';

    html += '</div>';
    if (pi < phases.length - 1) html += '<div style="width:2px;min-height:28px;flex:1;background:' + lineBg + ';margin:2px 0"></div>';
    html += '</div>';
    html += '<div style="flex:1;padding-bottom:' + (pi < phases.length - 1 ? '14px' : '0') + '">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">';
    html += '<div style="font-size:13px;font-weight:600;color:' + (isComplete ? '#1D9E75' : '#1A1917') + '">' + phObj.phase + '</div>';
    html += '<div style="font-size:11px;font-family:\"DM Mono\",monospace;color:' + (isComplete ? '#1D9E75' : '#9E9B94') + '">' + phDone + '/' + phObj.tasks.length + '</div>';
    html += '</div>';
    html += '<div style="height:4px;background:#F0EEE9;border-radius:2px;overflow:hidden;margin-bottom:5px">';
    html += '<div style="height:100%;background:' + dotBg + ';border-radius:2px;width:' + phPct + '%"></div></div>';
    html += '<div style="font-size:11px;color:' + statusColor + '">' + statusTxt + '</div>';
    html += '</div></div>';
  }
  html += '</div>';

  for (var ph = 0; ph < phases.length; ph++) {
    var phase = phases[ph];
    var pd = 0;
    for (var ti = 0; ti < phase.tasks.length; ti++) {
      if (ch[phase.tasks[ti].id]) pd++;
    }
    var pp = phase.tasks.length ? Math.round(pd / phase.tasks.length * 100) : 0;
    html += '<div class="phase">'
      + '<div class="phdr">'
      + '<span class="phnm">' + phase.phase + '</span>'
      + '<div class="phprog"><div class="phprogf" style="width:' + pp + '%"></div></div>'
      + '<span class="phct">' + pd + '/' + phase.tasks.length + '</span>'
      + '</div>';
    for (var tk = 0; tk < phase.tasks.length; tk++) {
      var task = phase.tasks[tk];
      var isDone = !!ch[task.id];
      var tm = (e.taskMeta && e.taskMeta[task.id]) ? e.taskMeta[task.id] : {};
      var assignee = tm.assignee || task.own;
      var deadline = tm.deadline || '';
      var dlClass = 'none', dlTxt = 'Set deadline';
      if (deadline) {
        var today = new Date(); today.setHours(0,0,0,0);
        var dlDate = new Date(deadline);
        var diff = Math.round((dlDate - today) / 86400000);
        if (diff < 0) { dlClass = 'overdue'; dlTxt = 'Overdue by ' + Math.abs(diff) + 'd'; }
        else if (diff <= 3) { dlClass = 'soon'; dlTxt = 'Due in ' + diff + 'd'; }
        else { dlClass = 'ok'; dlTxt = dlDate.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
      }
      var ownAv = avColor(assignee);
      html += '<div class="task' + (isDone ? ' done' : '') + '" data-empid="' + id + '" data-taskid="' + task.id + '">'
        + '<div class="tcb"><svg class="cksvg" viewBox="0 0 10 8"><polyline points="1,4 3.5,7 9,1"/></svg></div>'
        + '<div style="flex:1;min-width:0">'
        + '<div class="ttxt">' + task.n + '. ' + task.t + '</div>'
        + '<div class="task-meta">'
        + '<div class="task-owner">'
        + '<div class="task-owner-av" style="background:' + ownAv.bg + ';color:' + ownAv.c + '">' + initials(assignee) + '</div>'
        + '<input class="assign-input" data-empid="' + id + '" data-taskid="' + task.id + '" value="' + assignee + '" placeholder="Assign to..." title="Click to reassign" />'
        + '</div>'
        + '<span class="tag tagl">' + task.tl + '</span>'
        + '<span class="tag tagc">' + task.cat + '</span>'
        + '<span class="task-deadline ' + dlClass + '">'
        + (deadline ? dlTxt : '<input type="date" class="dl-picker" data-empid="' + id + '" data-taskid="' + task.id + '" value="' + deadline + '" title="Set deadline" />')
        + (deadline ? ' <input type="date" class="dl-picker" data-empid="' + id + '" data-taskid="' + task.id + '" value="' + deadline + '" title="Change deadline" style="width:0;opacity:0;position:absolute" />' : '')
        + '</span>'
        + '</div></div></div>';
    }
    html += '</div>';
  }

  document.getElementById("mainArea").innerHTML = html;

  // Wire buttons
  document.getElementById("backBtn").addEventListener("click", function(){ showHome(); });
  document.getElementById("editBtn").addEventListener("click", function(){ showEditModal(id); });
  document.getElementById("delBtn").addEventListener("click", function(){ deleteEmployee(id); });

  // Wire task checkboxes
  var taskEls = document.querySelectorAll(".task[data-empid]");
  for (var te = 0; te < taskEls.length; te++) {
    taskEls[te].addEventListener("click", function(ev){
      if (ev.target.classList.contains("assign-input") || ev.target.classList.contains("dl-picker")) return;
      toggleTask(this.getAttribute("data-empid"), this.getAttribute("data-taskid"));
    });
  }
  // Wire deadline pickers
  var dlPickers = document.querySelectorAll(".dl-picker");
  for (var dp = 0; dp < dlPickers.length; dp++) {
    dlPickers[dp].addEventListener("change", function(ev){
      ev.stopPropagation();
      var eid = this.getAttribute("data-empid");
      var tid = this.getAttribute("data-taskid");
      if (!emps[eid].taskMeta) emps[eid].taskMeta = {};
      if (!emps[eid].taskMeta[tid]) emps[eid].taskMeta[tid] = {};
      emps[eid].taskMeta[tid].deadline = this.value;
      saveData();
      showEmployee(eid);
    });
  }
  // Wire assignee inputs
  var assignInputs = document.querySelectorAll(".assign-input");
  for (var ai = 0; ai < assignInputs.length; ai++) {
    assignInputs[ai].addEventListener("change", function(ev){
      ev.stopPropagation();
      var eid = this.getAttribute("data-empid");
      var tid = this.getAttribute("data-taskid");
      if (!emps[eid].taskMeta) emps[eid].taskMeta = {};
      if (!emps[eid].taskMeta[tid]) emps[eid].taskMeta[tid] = {};
      emps[eid].taskMeta[tid].assignee = this.value.trim();
      saveData();
      showEmployee(eid);
    });
    assignInputs[ai].addEventListener("click", function(ev){ ev.stopPropagation(); });
  }
}

function toggleTask(empId, taskId) {
  if (!emps[empId]) return;
  if (!emps[empId].checks) emps[empId].checks = {};
  emps[empId].checks[taskId] = !emps[empId].checks[taskId];
  saveData();
  showEmployee(empId);
}

function deleteEmployee(id) {
  if (!confirm("Remove this employee? This cannot be undone.")) return;
  delete emps[id];
  saveData();
  selectedId = null;
  showHome();
}

// ── MODALS ───────────────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById("modalBox").innerHTML = html;
  document.getElementById("modal").classList.add("open");
}
function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

function showAddModal() {
  openModal(
    '<div class="modtitle">Add new employee</div>'
    + '<div class="fld"><label>Full name *</label><input id="mName" placeholder="e.g. Priya Sharma"/></div>'
    + '<div class="fld"><label>Role / designation</label><input id="mRole" placeholder="e.g. Analyst"/></div>'
    + '<div class="fld"><label>Department</label><input id="mDept" placeholder="e.g. Finance"/></div>'
    + '<div class="fld"><label>Date of joining</label><input id="mDOJ" type="date"/></div>'
    + '<div class="fld"><label>Checklist type</label><select id="mType">'
    + '<option>Local Onboarding</option>'
    + '<option>International Incoming</option>'
    + '<option>Local Offboarding</option>'
    + '<option>International Outgoing</option>'
    + '</select></div>'
    + '<div class="mbtns">'
    + '<button class="mbtn" id="mCancel">Cancel</button>'
    + '<button class="mbtn pri" id="mConfirm">+ Add employee</button>'
    + '</div>'
  );
  document.getElementById("mCancel").addEventListener("click", closeModal);
  document.getElementById("mConfirm").addEventListener("click", function(){
    var name = document.getElementById("mName").value.trim();
    if (!name) { alert("Please enter a name."); return; }
    var id = genId();
    emps[id] = {
      name: name,
      role: document.getElementById("mRole").value.trim(),
      dept: document.getElementById("mDept").value.trim(),
      doj: document.getElementById("mDOJ").value,
      type: document.getElementById("mType").value,
      checks: {}
    };
    saveData();
    closeModal();
    showToast(name + " added successfully.", "ok");
    showEmployee(id);
  });
}

function showEditModal(id) {
  var e = emps[id];
  if (!e) return;
  openModal(
    '<div class="modtitle">Edit employee</div>'
    + '<div class="fld"><label>Full name *</label><input id="mName" value="' + e.name + '"/></div>'
    + '<div class="fld"><label>Role / designation</label><input id="mRole" value="' + (e.role||'') + '"/></div>'
    + '<div class="fld"><label>Department</label><input id="mDept" value="' + (e.dept||'') + '"/></div>'
    + '<div class="fld"><label>Date of joining</label><input id="mDOJ" type="date" value="' + (e.doj||'') + '"/></div>'
    + '<div class="mbtns">'
    + '<button class="mbtn" id="mCancel">Cancel</button>'
    + '<button class="mbtn pri" id="mConfirm">Save changes</button>'
    + '</div>'
  );
  document.getElementById("mCancel").addEventListener("click", closeModal);
  document.getElementById("mConfirm").addEventListener("click", function(){
    var name = document.getElementById("mName").value.trim();
    if (!name) { alert("Please enter a name."); return; }
    emps[id].name = name;
    emps[id].role = document.getElementById("mRole").value.trim();
    emps[id].dept = document.getElementById("mDept").value.trim();
    emps[id].doj = document.getElementById("mDOJ").value;
    saveData();
    closeModal();
    showEmployee(id);
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById("homeNavBtn").addEventListener("click", showHome);
document.getElementById("addBtn").addEventListener("click", showAddModal);
document.getElementById("searchBox").addEventListener("input", renderSidebar);
document.getElementById("modal").addEventListener("click", function(e){
  if (e.target === this) closeModal();
});

loadData();
renderSidebar();
showHome();
</script>
