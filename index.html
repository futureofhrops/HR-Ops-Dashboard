<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMC HR Ops Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:DM Sans,sans-serif;background:#F7F6F3;color:#1A1917;min-height:100vh}
nav{background:#fff;border-bottom:1px solid #E4E1DA;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100}
.nlogo{width:28px;height:28px;background:#1A1917;border-radius:7px;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.ntitle{font-size:14px;font-weight:600;margin-left:9px}
.nsub{font-size:11px;color:#9E9B94;margin-left:4px}
.nbrand{display:flex;align-items:center}
.homebtn{width:32px;height:32px;border-radius:8px;border:1px solid #E4E1DA;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#6B6860}
.homebtn:hover{background:#F0EEE9}
.layout{display:grid;grid-template-columns:256px 1fr;min-height:calc(100vh - 54px)}
.sidebar{background:#fff;border-right:1px solid #E4E1DA;display:flex;flex-direction:column}
.sbhead{padding:13px 13px 10px;border-bottom:1px solid #E4E1DA}
.sbrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sblbl{font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.07em}
.sbcnt{font-size:11px;color:#9E9B94;background:#F0EEE9;padding:2px 7px;border-radius:10px}
.srch{width:100%;padding:7px 10px;border:1px solid #E4E1DA;border-radius:10px;font-family:DM Sans,sans-serif;font-size:13px;color:#1A1917;background:#F7F6F3;outline:none}
.srch::placeholder{color:#9E9B94}
.emplist{flex:1;overflow-y:auto;padding:8px}
.empitem{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;transition:background .12s}
.empitem:hover,.empitem.active{background:#F0EEE9}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.einfo{flex:1;min-width:0}
.ename{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.erole{font-size:11px;color:#9E9B94;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.minibar{height:2px;background:#E4E1DA;border-radius:2px;margin-top:3px;overflow:hidden}
.minifill{height:100%;background:#1D9E75;border-radius:2px}
.epct{font-size:11px;font-weight:500;color:#9E9B94;flex-shrink:0;font-family:DM Mono,monospace}
.addbtn{margin:8px;padding:10px;border:1px dashed #D0CCC3;border-radius:10px;background:none;font-family:DM Sans,sans-serif;font-size:13px;color:#6B6860;cursor:pointer;width:calc(100% - 16px);transition:all .15s}
.addbtn:hover{background:#F0EEE9;color:#1A1917}
.main{padding:22px;overflow-y:auto}

/* HOME */
.htitle{font-size:20px;font-weight:600;margin-bottom:3px}
.hsub{font-size:13px;color:#6B6860;margin-bottom:20px}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.statcard{background:#fff;border:1px solid #E4E1DA;border-radius:14px;padding:16px}
.statlbl{font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.statval{font-size:28px;font-weight:600;font-family:DM Mono,monospace;color:#1A1917}
.statval.g{color:#1D9E75}
.statpbar{height:4px;background:#F0EEE9;border-radius:2px;overflow:hidden;margin-top:8px}
.statpfill{height:100%;background:#1D9E75;border-radius:2px}
.sectlbl{font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.typegrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.typecard{border-radius:14px;padding:14px;border:1px solid transparent;cursor:pointer;transition:transform .15s,box-shadow .15s}.typecard:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.tcname{font-size:12px;font-weight:600;margin-bottom:8px}
.tcval{font-size:24px;font-weight:700;font-family:DM Mono,monospace;margin-bottom:2px}
.tcmeta{font-size:11px;opacity:.7;margin-bottom:8px}
.tcbar{height:3px;border-radius:2px;overflow:hidden}
.tcbarfill{height:100%;border-radius:2px}
.etable{background:#fff;border:1px solid #E4E1DA;border-radius:14px;overflow:hidden}
.etable table{width:100%;border-collapse:collapse;font-size:13px}
.etable th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.05em;background:#F0EEE9;border-bottom:1px solid #E4E1DA}
.etable td{padding:10px 14px;border-bottom:1px solid #E4E1DA}
.etable tr:last-child td{border-bottom:none}
.etable tbody tr:hover td{background:#F7F6F3;cursor:pointer}
.tpill{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.tprow{display:flex;align-items:center;gap:7px}
.tptrack{flex:1;height:4px;background:#F0EEE9;border-radius:2px;overflow:hidden;min-width:50px}
.tpfill{height:100%;background:#1D9E75;border-radius:2px}
.tppct{font-size:11px;font-weight:600;color:#1D9E75;font-family:DM Mono,monospace;min-width:28px}

/* EMP DETAIL */
.ehdr{background:#fff;border:1px solid #E4E1DA;border-radius:14px;padding:18px;margin-bottom:14px}
.ehrow{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.avlg{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.ehname{font-size:16px;font-weight:600}
.ehmeta{font-size:12px;color:#6B6860;margin-top:3px}
.ehacts{display:flex;gap:7px;flex-wrap:wrap;margin-left:auto}
.hbtn{padding:6px 11px;border:1px solid #E4E1DA;border-radius:10px;font-family:DM Sans,sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:#fff;color:#6B6860;display:inline-flex;align-items:center;gap:4px;transition:all .15s;text-decoration:none}
.hbtn:hover{background:#F0EEE9;color:#1A1917}
.hbtn.back{background:#F0EEE9;border-color:#D0CCC3;font-weight:500}
.hbtn.del{color:#DC2626;border-color:#FECACA}
.hbtn.del:hover{background:#FEF2F2}
.mets{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:12px}
.met{background:#F7F6F3;border-radius:10px;padding:9px 11px}
.metl{font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.metv{font-size:18px;font-weight:600;font-family:DM Mono,monospace;color:#1A1917}
.metv.g{color:#1D9E75}
.ptrack{height:4px;background:#F0EEE9;border-radius:3px;overflow:hidden;margin-bottom:4px}
.pbar{height:100%;background:#1D9E75;border-radius:3px;transition:width .4s}
.plbl{font-size:11px;color:#9E9B94;font-family:DM Mono,monospace}
.clbadge{display:flex;align-items:center;gap:8px;margin-bottom:13px;padding:9px 12px;border-radius:10px;font-size:13px;font-weight:500}
.clbadgedot{width:8px;height:8px;border-radius:50%}
.phase{margin-bottom:18px}
.phdr{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid #E4E1DA}
.phnm{font-size:10px;font-weight:700;color:#6B6860;text-transform:uppercase;letter-spacing:.07em}
.phprog{flex:1;height:3px;background:#E4E1DA;border-radius:2px;overflow:hidden;max-width:70px}
.phprogf{height:100%;background:#1D9E75;border-radius:2px}
.phct{font-size:10px;padding:2px 7px;border-radius:10px;background:#F0EEE9;color:#9E9B94;font-family:DM Mono,monospace}
.task{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:10px;cursor:pointer;margin-bottom:2px;transition:background .1s}
.task:hover{background:#F0EEE9}
.task.done{opacity:.45}
.tcb{width:16px;height:16px;border-radius:4px;border:1.5px solid #D0CCC3;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .15s}
.task.done .tcb{background:#1D9E75;border-color:#1D9E75}
.cksvg{width:10px;height:10px;stroke:#fff;stroke-width:2.5;fill:none;display:none}
.task.done .cksvg{display:block}
.ttxt{font-size:13px;color:#1A1917;line-height:1.45}
.task.done .ttxt{text-decoration:line-through;color:#9E9B94}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.tago{background:#EFF6FF;color:#2563EB}
.tagl{background:#E1F5EE;color:#065F46}
.tagc{background:#F5F3FF;color:#7C3AED}

/* MODAL */
.movlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.movlay.open{display:flex}
.modbox{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:400px;animation:fadeup .2s ease}
@keyframes fadeup{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.modtitle{font-size:15px;font-weight:600;margin-bottom:16px}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:12px;font-weight:500;color:#6B6860;margin-bottom:4px}
.fld input,.fld select{width:100%;padding:8px 11px;border:1px solid #E4E1DA;border-radius:10px;font-family:DM Sans,sans-serif;font-size:13px;color:#1A1917;background:#fff;outline:none}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mbtn{padding:8px 15px;border:1px solid #E4E1DA;border-radius:10px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#6B6860}
.mbtn:hover{background:#F0EEE9}
.mbtn.pri{background:#1A1917;color:#fff;border-color:#1A1917}
.mbtn.pri:hover{background:#333}
#toasts{position:fixed;bottom:18px;right:18px;z-index:300;display:flex;flex-direction:column;gap:7px}
.toast{padding:11px 15px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:8px;animation:slidein .2s ease;max-width:320px}
@keyframes slidein{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.ok{background:#E1F5EE;color:#065F46;border:1px solid #9FE1CB}
.toast.err{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.emptystate{padding:32px;text-align:center;color:#9E9B94;font-size:13px}
.met.clickable{cursor:pointer;transition:all .15s}
.met.clickable:hover{background:#E4E1DA;transform:translateY(-1px)}
.met.clickable:active{transform:translateY(0)}
.quickpanel{position:fixed;top:0;right:0;width:400px;height:100vh;background:#fff;border-left:1px solid #E4E1DA;z-index:250;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.12);animation:slideright .2s ease}
@keyframes slideright{from{transform:translateX(400px)}to{transform:translateX(0)}}
.qp-head{padding:16px 18px;border-bottom:1px solid #E4E1DA;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.qp-title{font-size:14px;font-weight:600;color:#1A1917}
.qp-sub{font-size:11px;color:#9E9B94;margin-top:2px}
.qp-close{background:none;border:none;font-size:18px;cursor:pointer;color:#9E9B94;padding:0;line-height:1}
.qp-close:hover{color:#1A1917}
.qp-body{flex:1;overflow-y:auto;padding:12px}
.qp-section{margin-bottom:14px}
.qp-sect-lbl{font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #F0EEE9}
.qp-task{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:8px;margin-bottom:3px;background:#F7F6F3}
.qp-task-num{font-size:10px;font-weight:700;color:#9E9B94;min-width:18px;margin-top:1px;font-family:'DM Mono',monospace}
.qp-task-txt{font-size:12px;color:#1A1917;line-height:1.4;flex:1}
.qp-task-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.qp-owner-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:#F7F6F3;margin-bottom:4px}
.qp-owner-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.qp-owner-name{font-size:13px;font-weight:500;color:#1A1917;flex:1}
.qp-owner-cnt{font-size:11px;font-family:'DM Mono',monospace;color:#9E9B94;background:#E4E1DA;padding:2px 7px;border-radius:10px}
.qp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:249}
.doc-section{background:#F7F6F3;border:1px solid #E4E1DA;border-radius:14px;padding:14px;margin-bottom:14px}
.doc-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#fff;border:1px solid #E4E1DA;border-radius:8px;margin-bottom:6px}
.doc-icon{width:32px;height:32px;border-radius:8px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.doc-name{flex:1;font-size:13px;font-weight:500;color:#1A1917;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-date{font-size:11px;color:#9E9B94}
.doc-btns{display:flex;gap:5px}
.doc-btn{padding:4px 9px;border:1px solid #E4E1DA;border-radius:6px;font-size:11px;cursor:pointer;background:#fff;color:#6B6860;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.doc-btn:hover{background:#F0EEE9}
.doc-btn.primary{background:#1A1917;color:#fff;border-color:#1A1917}
.doc-btn.primary:hover{background:#333}
.doc-upload-area{border:2px dashed #D0CCC3;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:8px}
.doc-upload-area:hover{border-color:#9E9B94;background:#F0EEE9}
.doc-upload-area input{display:none}
.task-comment{width:100%;padding:5px 8px;border:1px solid #E4E1DA;border-radius:6px;font-family:DM Sans,sans-serif;font-size:12px;color:#1A1917;resize:vertical;outline:none;line-height:1.5;transition:border-color .15s;box-sizing:border-box}
.task-comment:focus{border-color:#D0CCC3}
.task-comment::placeholder{color:#9E9B94}
.add-comment-btn{font-size:10px;color:#9E9B94;background:none;border:none;cursor:pointer;padding:2px 0;margin-top:2px;font-family:DM Sans,sans-serif;text-decoration:underline}
.add-comment-btn:hover{color:#6B6860}
.comment-bubble{border-radius:6px;padding:6px 8px;font-size:11px;margin-top:5px;line-height:1.4;display:flex;align-items:flex-start}
.comment-bubble.overdue-comment{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.comment-bubble.info-comment{background:#F0F9FF;border:1px solid #BAE6FD;color:#0C4A6E}
.grplbl{font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.07em;padding:10px 10px 4px}
.grpdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.task-meta{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap}
.task-owner{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#1A1917}
.task-owner-av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.task-deadline{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:500}
.task-deadline.ok{background:#E1F5EE;color:#065F46}
.task-deadline.soon{background:#FFFBEB;color:#92400E}
.task-deadline.overdue{background:#FEF2F2;color:#DC2626;font-weight:700}
.task-deadline.none{background:#F0EEE9;color:#9E9B94}
.dl-picker{border:none;background:transparent;font-family:DM Sans,sans-serif;font-size:11px;color:#6B6860;cursor:pointer;padding:0;outline:none}
.assign-input{border:none;background:transparent;font-family:DM Sans,sans-serif;font-size:11px;color:#1A1917;font-weight:600;outline:none;width:90px;cursor:pointer}
.assign-input::placeholder{color:#9E9B94;font-weight:400}
</style>
</head>
<body>

<nav>
  <div class="nbrand">
    <div class="nlogo">HR</div>
    <span class="ntitle">HR Ops Dashboard</span>
    <span class="nsub">&middot; India Operations &middot; IMC</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="homebtn" id="exportBtn" style="width:auto;padding:0 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;color:#1D9E75;border-color:#9FE1CB">&#8681; Export CSV</button>
    <button class="homebtn" id="homeNavBtn" title="Go to dashboard">&#8962;</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sbhead">
      <div class="sbrow">
        <span class="sblbl">Employees</span>
        <span class="sbcnt" id="empCount">0</span>
      </div>
      <button class="addbtn" id="addBtn" style="margin:0 0 8px 0;background:#1A1917;color:#fff;border-color:#1A1917;border-style:solid;border-radius:8px;font-weight:500">+ Add new employee</button>
      <input class="srch" id="searchBox" placeholder="Search employees…"/>
    </div>
    <div class="emplist" id="empList"></div>
  </aside>
  <main class="main" id="mainArea"></main>
</div>

<div class="movlay" id="modal">
  <div class="modbox" id="modalBox"></div>
</div>
<div id="toasts"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────

var TYPES = ["Local Onboarding","International Incoming","Local Offboarding","International Outgoing","Local Transfer Out"];

var TYPE_COLORS = {
  "Local Onboarding":       {bg:"#EFF6FF", c:"#1D4ED8", dot:"#2563EB"},
  "International Incoming": {bg:"#F0FDF4", c:"#15803D", dot:"#16A34A"},
  "Local Offboarding":      {bg:"#FFF7ED", c:"#C2410C", dot:"#EA580C"},
  "International Outgoing": {bg:"#FDF4FF", c:"#7E22CE", dot:"#9333EA"},
  "Local Transfer Out":     {bg:"#FFF0F9", c:"#9D174D", dot:"#DB2777"}
};

var AV_PAL = [
  {bg:"#EFF6FF",c:"#1D4ED8"},{bg:"#F0FDF4",c:"#15803D"},
  {bg:"#FDF4FF",c:"#7E22CE"},{bg:"#FFF7ED",c:"#C2410C"},
  {bg:"#FFF1F2",c:"#BE123C"},{bg:"#F0FDFA",c:"#0F766E"}
];

var CHECKLISTS = {
"Local Onboarding": [
  {phase:"Pre joining — Upon hire confirmation", tasks:[
    {id:"lo1",n:1,own:"HR Ops & Recruitment",tl:"Upon hire confirmation",dlOffset:null,cat:"Tracker",t:"Update Employee Onboarding Pipeline Checklist in Box. Jointly maintained tracker."},
    {id:"lo2",n:2,own:"HR Ops Associate",tl:"Upon receipt of Email 2 from Recruitment",dlOffset:null,cat:"Communication",t:"Call candidate: introduce HR Ops as POC, inform about HireRight BGV vendor and in-person visit process."},
    {id:"lo3",n:3,own:"HR Ops Associate",tl:"Same day as initial call",dlOffset:null,cat:"Communication",t:"Send summary email to candidate with DOJ and BGV vendor details. Refer Email 1 draft – Confluence."},
    {id:"lo4",n:4,own:"HR Ops Associate",tl:"Upon hire confirmation",dlOffset:null,cat:"Relocation",t:"Send relocation email to Travel Desk (CC: candidate & Neha Sawant) — if applicable. Refer Confluence for draft & attachments."},
    {id:"lo5",n:5,own:"HR Ops Associate",tl:"Immediately upon DOJ confirmation",dlOffset:null,cat:"Calendar",t:"Block calendar for candidate's DOJ."},
    {id:"lo6",n:6,own:"HR Ops Associate",tl:"Immediately upon DOJ confirmation",dlOffset:null,cat:"Communication",t:"Notify MD, HR Team (excl. Recruitment), Compliance, IT & Facility Team with new joiner details. Include: joining date, job profile, team."}
  ]},
  {phase:"Pre joining — D-14 days", tasks:[
    {id:"lo7",n:7,own:"HR Ops Associate",tl:"D-14 days",dlOffset:-14,cat:"Onboarding Plan",t:"Request Hiring Manager to prepare & submit onboarding plan (key meetings, functional onboarding, 3-month goals). Refer Onboarding Plan draft – Confluence."},
    {id:"lo8",n:8,own:"HR Ops Associate",tl:"D-14 days",dlOffset:-14,cat:"Communication",t:"Send Welcome Email to candidate to collect & confirm key details (CC: Facilities, Payroll). Refer Email 2 draft – Confluence."},
    {id:"lo9",n:9,own:"HR Ops Associate",tl:"D-14 days",dlOffset:-14,cat:"Workday",t:"Complete all required Workday tasks; resolve any discrepancies with Recruitment Team. Document changes via addendum if DOJ/benefits change."},
    {id:"lo10",n:10,own:"HR Ops Associate",tl:"D-14 days",dlOffset:-14,cat:"BGV",t:"Initiate BGV via Workday; if not triggered automatically, initiate manually via HireRight portal. Second step in Workday hire process."}
  ]},

// ── STATE ────────────────────────────────────────────────────────────────────
var emps = {};
var selectedId = null;
var SK = "imc_obt_v1";

var docs = {};
var DOCS_SK = "imc_obt_docs_v2";
function loadData() {
  try { var s = localStorage.getItem(SK); if (s) emps = JSON.parse(s); } catch(e) {}
  try { var d = localStorage.getItem(DOCS_SK); if (d) { var parsed = JSON.parse(d); docs = (parsed && typeof parsed === "object" && !Array.isArray(parsed)) ? parsed : {}; } } catch(e) {}
}
function saveData() {
  try { localStorage.setItem(SK, JSON.stringify(emps)); } catch(e) {}
}
function saveDocs() {
  try { localStorage.setItem(DOCS_SK, JSON.stringify(docs)); } catch(e) {}
}
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}
function initials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(function(w){ return w[0] || ""; }).join("").toUpperCase() || "?";
}
function avColor(id) {
  var h = 0;
  for (var i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) & 0xfffffff;
  return AV_PAL[h % AV_PAL.length];
}
function allTasks(type) {
  var result = [];
  var phases = CHECKLISTS[type];
  for (var i = 0; i < phases.length; i++) {
    for (var j = 0; j < phases[i].tasks.length; j++) {
      result.push(phases[i].tasks[j]);
    }
  }
  return result;
}
function doneCount(emp) {
  var tasks = allTasks(emp.type);
  var ch = emp.checks || {};
  var count = 0;
  for (var i = 0; i < tasks.length; i++) {
    if (ch[tasks[i].id]) count++;
  }
  return count;
}
function pct(emp) {
  var total = allTasks(emp.type).length;
  return total ? Math.round(doneCount(emp) / total * 100) : 0;
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  var el = document.createElement("div");
  el.className = "toast " + (type || "ok");
  el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(function(){ el.remove(); }, 4000);
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  var q = document.getElementById("searchBox").value.toLowerCase();
  var allIds = Object.keys(emps);
  var ids = allIds.filter(function(id){
    return !q || emps[id].name.toLowerCase().indexOf(q) !== -1;
  });
  document.getElementById("empCount").textContent = allIds.length;
  var el = document.getElementById("empList");
  if (!ids.length) {
    el.innerHTML = '<div class="emptystate">' + (q ? "No results" : "No employees yet") + '</div>';
    return;
  }
  var html = "";
  // Group by checklist type
  for (var t = 0; t < TYPES.length; t++) {
    var type = TYPES[t];
    var col = TYPE_COLORS[type];
    var groupIds = ids.filter(function(id){ return emps[id].type === type; });
    if (!groupIds.length) continue;
    html += '<div class="grplbl"><span class="grpdot" style="background:' + col.dot + '"></span>' + type.replace("International ","Intl. ") + ' <span style="font-weight:400;opacity:.7">(' + groupIds.length + ')</span></div>';
    for (var i = 0; i < groupIds.length; i++) {
      var id = groupIds[i];
      var e = emps[id];
      var p = pct(e);
      var a = avColor(id);
      var active = selectedId === id ? " active" : "";
      html += '<div class="empitem' + active + '" data-id="' + id + '">'
        + '<div class="av" style="background:' + a.bg + ';color:' + a.c + '">' + initials(e.name) + '</div>'
        + '<div class="einfo">'
        + '<div class="ename">' + e.name + '</div>'
        + '<div class="erole">' + (e.role || '—') + '</div>'
        + '<div class="minibar"><div class="minifill" style="width:' + p + '%"></div></div>'
        + '</div>'
        + '<div class="epct">' + p + '%</div>'
        + '</div>';
    }
  }
  el.innerHTML = html;
  var items = el.querySelectorAll(".empitem");
  for (var j = 0; j < items.length; j++) {
    items[j].addEventListener("click", function(){
      showEmployee(this.getAttribute("data-id"));
    });
  }
}

// ── HOME ─────────────────────────────────────────────────────────────────────
function showFilteredType(type) {
  selectedId = null;
  renderSidebar();
  var col = TYPE_COLORS[type];
  var ids = Object.keys(emps).filter(function(id){ return emps[id].type === type; });
  var d = ids.reduce(function(s,id){ return s + doneCount(emps[id]); }, 0);
  var tot = ids.reduce(function(s,id){ return s + allTasks(type).length; }, 0);
  var p = tot ? Math.round(d / tot * 100) : 0;

  var html = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap">'
    + '<button class="hbtn back" id="backToHome">&larr; Back to dashboard</button>'
    + '<div class="clbadge" style="background:' + col.bg + ';border:1px solid ' + col.dot + '44;color:' + col.c + ';margin-bottom:0">'
    + '<div class="clbadgedot" style="background:' + col.dot + '"></div>' + type + '</div>'
    + '<button class="hbtn" id="exportTypeBtn" style="color:#1D9E75;border-color:#9FE1CB;margin-left:auto">&#8681; Export employees</button>'
    + '<button class="hbtn" id="exportCLBtn" style="color:#7C3AED;border-color:#DDD6FE">&#8681; Export checklist</button>'
    + '<button class="hbtn" id="docsTypeBtn" style="color:#7C3AED;border-color:#DDD6FE">&#128196; Docs</button>'
    + '</div>'
    + '<div class="hsub" style="margin-bottom:18px">' + ids.length + ' employee' + (ids.length !== 1 ? 's' : '') + ' &middot; ' + d + ' of ' + tot + ' tasks completed &middot; ' + p + '% overall progress</div>';

  // Stats row
  html += '<div class="statgrid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">'
    + '<div class="statcard"><div class="statlbl">Employees</div><div class="statval">' + ids.length + '</div></div>'
    + '<div class="statcard"><div class="statlbl">Tasks completed</div><div class="statval g">' + d + '</div></div>'
    + '<div class="statcard"><div class="statlbl">Tasks remaining</div><div class="statval">' + (tot - d) + '</div></div>'
    + '<div class="statcard"><div class="statlbl">Progress</div><div class="statval g">' + p + '%'
    + '<div class="statpbar"><div class="statpfill" style="width:' + p + '%"></div></div></div></div>'
    + '</div>';

  if (ids.length === 0) {
    html += '<div class="emptystate">No employees added under ' + type + ' yet.</div>';
  } else {
    html += '<div class="sectlbl">Employees — ' + type + '</div>'
      + '<div class="etable"><table>'
      + '<thead><tr><th>Employee</th><th>Role</th><th>DOJ</th><th>Progress</th><th>Tasks</th></tr></thead>'
      + '<tbody>';
    for (var r = 0; r < ids.length; r++) {
      var rid = ids[r];
      var re = emps[rid];
      var ra = avColor(rid);
      var rp = pct(re);
      var rd = doneCount(re);
      var rtot = allTasks(re.type).length;
      html += '<tr data-id="' + rid + '">'
        + '<td><div style="display:flex;align-items:center;gap:9px">'
        + '<div style="width:28px;height:28px;border-radius:50%;background:' + ra.bg + ';color:' + ra.c + ';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">' + initials(re.name) + '</div>'
        + '<div><div style="font-weight:500">' + re.name + '</div></div></div></td>'
        + '<td style="color:#6B6860;font-size:12px">' + (re.role || '—') + '</td>'
        + '<td style="color:#6B6860;font-size:12px">' + (re.doj || '—') + '</td>'
        + '<td><div class="tprow"><div class="tptrack"><div class="tpfill" style="width:' + rp + '%"></div></div><span class="tppct">' + rp + '%</span></div></td>'
        + '<td style="font-family:DM Mono,monospace;font-size:12px;color:#6B6860">' + rd + '/' + rtot + '</td>'
        + '</tr>';
    }
    html += '</tbody></table></div>';
  }

  document.getElementById("mainArea").innerHTML = html;

  document.getElementById("backToHome").addEventListener("click", function(){ showHome(); });
  document.getElementById("exportTypeBtn").addEventListener("click", function(){ exportByType(type); });
  document.getElementById("exportCLBtn").addEventListener("click", function(){ exportChecklist(type); });

  var closeBtn = panel.querySelector ? panel.querySelector("#qpCloseBtn") : null;
  if (closeBtn) closeBtn.addEventListener("click", closeQuickPanel);

  // Wire toggle rows - click to expand/collapse
  var toggles = panel.querySelectorAll ? panel.querySelectorAll(".qp-emp-toggle") : [];
  for (var ti=0; ti<toggles.length; ti++) {
    toggles[ti].addEventListener("click", function(){
      var taskBody = this.nextElementSibling;
      var chevron = this.querySelector(".qp-chevron");
      if (taskBody) {
        var isOpen = taskBody.style.display !== "none";
        taskBody.style.display = isOpen ? "none" : "block";
        if (chevron) chevron.style.transform = isOpen ? "" : "rotate(180deg)";
      }
    });
  }

  // Wire "Open full checklist" buttons
  var gotoBtns = panel.querySelectorAll ? panel.querySelectorAll(".qp-goto-emp") : [];
  for (var gi=0; gi<gotoBtns.length; gi++) {
    gotoBtns[gi].addEventListener("click", function(ev){
      ev.stopPropagation();
      closeQuickPanel();
      showEmployee(this.getAttribute("data-id"));
    });
  }
}


function closeQuickPanel() {
  var panel = document.getElementById("quickPanel");
  var overlay = document.getElementById("qpOverlay");
  if (panel && panel.parentNode) panel.parentNode.removeChild(panel);
  if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
}

function showRemainingPanel(empId) {
  closeQuickPanel();
  var e = emps[empId]; if (!e) return;
  var ch = e.checks || {};
  var phases = CHECKLISTS[e.type];

  var overlay = document.createElement("div");
  overlay.className = "qp-overlay"; overlay.id = "qpOverlay";
  overlay.addEventListener("click", closeQuickPanel);
  document.body.appendChild(overlay);

  var panel = document.createElement("div");
  panel.className = "quickpanel"; panel.id = "quickPanel";

  var remaining = [];
  phases.forEach(function(phase) {
    var pTasks = phase.tasks.filter(function(t){ return !ch[t.id]; });
    if (pTasks.length) remaining.push({phase: phase.phase, tasks: pTasks});
  });

  var total = phases.reduce(function(s,p){ return s + p.tasks.length; }, 0);
  var done = total - remaining.reduce(function(s,p){ return s + p.tasks.length; }, 0);

  var html = '<div class="qp-head"><div><div class="qp-title">Remaining tasks — ' + e.name + '</div>'
    + '<div class="qp-sub">' + (total-done) + ' of ' + total + ' tasks pending</div></div>'
    + '<button id="qpCloseBtn" class="qp-close">&#10005;</button></div>'
    + '<div class="qp-body">';

  if (remaining.length === 0) {
    html += '<div style="text-align:center;padding:40px;color:#1D9E75;font-size:13px">&#10003; All tasks completed!</div>';
  } else {
    remaining.forEach(function(p) {
      html += '<div class="qp-section"><div class="qp-sect-lbl">' + p.phase + ' (' + p.tasks.length + ' remaining)</div>';
      p.tasks.forEach(function(task) {
        var tm = (e.taskMeta && e.taskMeta[task.id]) || {};
        var assignee = tm.assignee || task.own;
        var deadline = tm.deadline || '';
        if (!deadline && task.dlOffset !== null && task.dlOffset !== undefined && e.doj) {
          var doj = new Date(e.doj); doj.setDate(doj.getDate() + task.dlOffset);
          deadline = doj.toISOString().slice(0,10);
        }
        var dlTxt = '';
        if (deadline) {
          var today = new Date(); today.setHours(0,0,0,0);
          var diff = Math.round((new Date(deadline) - today) / 86400000);
          if (diff < 0) dlTxt = '<span class="tag" style="background:#FEF2F2;color:#DC2626">Overdue '+Math.abs(diff)+'d</span>';
          else if (diff <= 3) dlTxt = '<span class="tag" style="background:#FFFBEB;color:#92400E">Due in '+diff+'d</span>';
          else dlTxt = '<span class="tag" style="background:#E1F5EE;color:#065F46">' + new Date(deadline).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + '</span>';
        }
        var comment = tm.comment || '';
        html += '<div class="qp-task"><div class="qp-task-num">' + task.n + '</div>'
          + '<div><div class="qp-task-txt">' + task.t + '</div>'
          + '<div class="qp-task-tags"><span class="tag tago">' + assignee + '</span>' + dlTxt
          + (comment ? '<span class="tag" style="background:#FDF4FF;color:#7C3AED">&#128172; '+comment+'</span>' : '')
          + '</div></div></div>';
      });
      html += '</div>';
    });
  }
  html += '</div>';
  panel.innerHTML = html;
  document.body.appendChild(panel);
  var cb=panel.querySelector?panel.querySelector('#qpCloseBtn'):null;
  if(cb) cb.addEventListener('click',closeQuickPanel);
}

function showOwnersPanel(empId) {
  closeQuickPanel();
  var e = emps[empId]; if (!e) return;
  var ch = e.checks || {};
  var phases = CHECKLISTS[e.type];

  var overlay = document.createElement("div");
  overlay.className = "qp-overlay"; overlay.id = "qpOverlay";
  overlay.addEventListener("click", closeQuickPanel);
  document.body.appendChild(overlay);

  var panel = document.createElement("div");
  panel.className = "quickpanel"; panel.id = "quickPanel";

  // Build owner map
  var ownerMap = {};
  phases.forEach(function(phase) {
    phase.tasks.forEach(function(task) {
      var tm = (e.taskMeta && e.taskMeta[task.id]) || {};
      var owner = tm.assignee || task.own;
      if (!ownerMap[owner]) ownerMap[owner] = {total:0, done:0, pending:[]};
      ownerMap[owner].total++;
      if (ch[task.id]) ownerMap[owner].done++;
      else ownerMap[owner].pending.push(task);
    });
  });

  var html = '<div class="qp-head"><div><div class="qp-title">Owners — ' + e.name + '</div>'
    + '<div class="qp-sub">' + Object.keys(ownerMap).length + ' owners across ' + phases.reduce(function(s,p){return s+p.tasks.length;},0) + ' tasks</div></div>'
    + '<button id="qpCloseBtn" class="qp-close">&#10005;</button></div>'
    + '<div class="qp-body">';

  Object.keys(ownerMap).sort().forEach(function(owner) {
    var o = ownerMap[owner];
    var a = avColor(owner);
    var pct = o.total ? Math.round(o.done/o.total*100) : 0;
    html += '<div class="qp-owner-row">'
      + '<div class="qp-owner-av" style="background:'+a.bg+';color:'+a.c+'">' + initials(owner) + '</div>'
      + '<div style="flex:1"><div class="qp-owner-name">' + owner + '</div>'

      + '<div style="height:100%;background:#1D9E75;border-radius:2px;width:'+pct+'%"></div></div></div>'
      + '<div><div class="qp-owner-cnt">' + o.done + '/' + o.total + '</div>'

      + '</div>';
    if (o.pending.length) {
      o.pending.forEach(function(t) {
        html += '<div style="padding:4px 8px 4px 46px;font-size:11px;color:#6B6860;border-left:2px solid #F0EEE9;margin:2px 0 2px 14px">'+t.n+'. '+t.t+'</div>';
      });
    }
  });

  html += '</div>';
  panel.innerHTML = html;
  document.body.appendChild(panel);
  var cb=panel.querySelector?panel.querySelector('#qpCloseBtn'):null;
  if(cb) cb.addEventListener('click',closeQuickPanel);
}

  var delBtns = document.querySelectorAll(".doc-del-btn");

    delBtns[di].addEventListener("click", function(ev){
      ev.stopPropagation();
      var idx = parseInt(this.getAttribute("data-idx"));
      if (!confirm("Remove this document?")) return;
      if (docs[clType]) docs[clType].splice(idx, 1);
      saveDocs();

      if (dl) { dl.innerHTML = renderDocList(clType); wireDocDel(clType); }

function renderDocList(clType) {
  var list = (docs && docs[clType]) ? docs[clType] : [];
  if (!list.length) return '<div style="text-align:center;padding:20px;color:#9E9B94;font-size:13px">No documents uploaded for ' + clType + ' yet</div>';
  return list.map(function(doc, i) {
    var icon = doc.type && doc.type.indexOf("pdf") !== -1 ? "&#128196;" :
               doc.type && doc.type.indexOf("image") !== -1 ? "&#128444;" :
               doc.name && doc.name.indexOf(".xlsx") !== -1 ? "&#128202;" :
               doc.name && doc.name.indexOf(".pptx") !== -1 ? "&#128205;" : "&#128196;";
    var kb = doc.size ? Math.round(doc.size/1024) + " KB" : "";
    return '<div class="doc-item">'
      + '<div class="doc-icon">' + icon + '</div>'
      + '<div style="flex:1;min-width:0"><div class="doc-name">' + doc.name + '</div>'
      + '<div class="doc-date">' + doc.date + (kb ? " · " + kb : "") + '</div></div>'
      + '<div class="doc-btns">'
      + '<a class="doc-btn primary" href="' + doc.data + '" download="' + doc.name + '">&#8681;</a>'
      + '<button class="doc-btn doc-del-btn" data-idx="' + i + '" style="color:#DC2626;border-color:#FECACA">&#10005;</button>'
      + '</div></div>';
  }).join("");
}

function infoField(label, value) {
  if (!value) return '';
  return '<div style="min-width:100px"><div style="font-size:10px;font-weight:700;color:#9E9B94;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">' + label + '</div>'
    + '<div style="font-size:13px;color:#1A1917;font-weight:500">' + value + '</div></div>';
}
function buildEmpInfo(e) {
  var fields = '';
  if (e.type === 'Local Onboarding') {
    fields += infoField('Position', e.role);
    fields += infoField('Department', e.dept);
    fields += infoField('Date of joining', e.doj);
  } else if (e.type === 'International Incoming') {
    fields += infoField('Position', e.role);
    fields += infoField('Manager', e.manager);
    fields += infoField('Team', e.team);
    fields += infoField('Transfer date', e.doj);
    fields += infoField('Transfer type', e.transferType);
    if (e.tempEnd) fields += infoField('Assignment end date', e.tempEnd);
    if (e.assignmentDuration) fields += infoField('Assignment duration', e.assignmentDuration);
  } else if (e.type === 'Local Offboarding') {
    fields += infoField('Last working day', e.lwd || e.doj);
    fields += infoField('Termination date', e.termDate);
    fields += infoField('Garden leave', e.gardenLeave && e.gardenLeave !== 'No' ? e.gardenLeave : (e.gardenLeave === 'No' ? 'No' : '—'));
    fields += infoField('Non-compete', e.nonCompete && e.nonCompete !== 'No' ? e.nonCompete : (e.nonCompete === 'No' ? 'No' : '—'));
  } else if (e.type === 'International Outgoing') {
    fields += infoField('Next position', e.role);
    fields += infoField('Next manager', e.nextManager);
    fields += infoField('Next team', e.team);
    fields += infoField('Transfer date', e.doj);
    fields += infoField('Transfer type', e.transferType);
  } else if (e.type === 'Local Transfer Out') {
    fields += infoField('Date of transfer', e.doj);
    fields += infoField('Next position', e.role);
    fields += infoField('Next manager', e.nextManager);
    fields += infoField('Next team', e.team);
    fields += infoField('Transfer type', e.transferType);
    if (e.toRegion) fields += infoField('Transfer to', e.toRegion);
    if (e.tempEnd) fields += infoField('Assignment end date', e.tempEnd);
    if (e.assignmentDuration) fields += infoField('Assignment duration', e.assignmentDuration);
  }
  fields += infoField('Checklist type', e.type);
  return fields;
}

  for (var pi = 0; pi < phases.length; pi++) {
    var phObj = phases[pi];
    var phDone = 0;
    for (var pti = 0; pti < phObj.tasks.length; pti++) { if (ch[phObj.tasks[pti].id]) phDone++; }
    var phPct = phObj.tasks.length ? Math.round(phDone / phObj.tasks.length * 100) : 0;
    var isComplete = phDone === phObj.tasks.length && phObj.tasks.length > 0;
    var isStarted = phDone > 0 && !isComplete;
    var dotBg = isComplete ? '#1D9E75' : isStarted ? col.dot : '#E4E1DA';
    var lineBg = isComplete ? '#1D9E75' : '#E4E1DA';
    var statusTxt = isComplete ? 'Completed' : isStarted ? 'In progress &mdash; ' + phDone + ' of ' + phObj.tasks.length + ' tasks done' : 'Not started';

    html += '<div style="display:flex;gap:14px">';
    html += '<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">';
    html += '<div style="width:24px;height:24px;border-radius:50%;background:' + dotBg + ';display:flex;align-items:center;justify-content:center">';
    if (isComplete) html += '<svg width="12" height="10" viewBox="0 0 10 8" fill="none"><polyline points="1,4 3.5,7 9,1" stroke="white" stroke-width="2"/></svg>';
    else html += '<div style="width:8px;height:8px;border-radius:50%;background:' + (isStarted ? '#fff' : '#D0CCC3') + '"></div>';
    html += '</div>';
    if (pi < phases.length - 1) html += '<div style="width:2px;min-height:28px;flex:1;background:' + lineBg + ';margin:2px 0"></div>';
    html += '</div>';
    html += '<div style="flex:1;padding-bottom:' + (pi < phases.length - 1 ? '14px' : '0') + '">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">';
    html += '<div style="font-size:13px;font-weight:600;color:' + (isComplete ? '#1D9E75' : '#1A1917') + '">' + phObj.phase + '</div>';
    html += '<div style="font-size:11px;font-family:DM Mono,monospace;color:' + (isComplete ? '#1D9E75' : '#9E9B94') + '">' + phDone + '/' + phObj.tasks.length + '</div>';
    html += '</div>';
    html += '<div style="height:4px;background:#F0EEE9;border-radius:2px;overflow:hidden;margin-bottom:5px">';
    html += '<div style="height:100%;background:' + dotBg + ';border-radius:2px;width:' + phPct + '%"></div></div>';
    html += '<div style="font-size:11px;color:' + statusColor + '">' + statusTxt + '</div>';
    html += '</div></div>';
  }
  html += '</div>';

  for (var ph = 0; ph < phases.length; ph++) {
    var phase = phases[ph];
    var pd = 0;
    for (var ti = 0; ti < phase.tasks.length; ti++) {
      if (ch[phase.tasks[ti].id]) pd++;
    }
    var pp = phase.tasks.length ? Math.round(pd / phase.tasks.length * 100) : 0;
    html += '<div class="phase">'
      + '<div class="phdr">'
      + '<span class="phnm">' + phase.phase + '</span>'
      + '<div class="phprog"><div class="phprogf" style="width:' + pp + '%"></div></div>'
      + '<span class="phct">' + pd + '/' + phase.tasks.length + '</span>'
      + '</div>';
    for (var tk = 0; tk < phase.tasks.length; tk++) {
      var task = phase.tasks[tk];
      var isDone = !!ch[task.id];
      var tm = (e.taskMeta && e.taskMeta[task.id]) ? e.taskMeta[task.id] : {};
      var assignee = tm.assignee || task.own;
      // Auto-calculate deadline from dlOffset + DOJ if not manually set
      var deadline = tm.deadline || '';
      if (!deadline && task.dlOffset !== null && task.dlOffset !== undefined && e.doj) {
        var doj = new Date(e.doj);
        doj.setDate(doj.getDate() + task.dlOffset);
        deadline = doj.toISOString().slice(0,10);
      }
      var dlClass = 'none', dlTxt = 'Set deadline';
      if (deadline) {
        var today = new Date(); today.setHours(0,0,0,0);
        var dlDate = new Date(deadline);
        var diff = Math.round((dlDate - today) / 86400000);
        if (diff < 0) { dlClass = 'overdue'; dlTxt = 'Overdue by ' + Math.abs(diff) + 'd'; }
        else if (diff <= 3) { dlClass = 'soon'; dlTxt = 'Due in ' + diff + 'd'; }
        else { dlClass = 'ok'; dlTxt = dlDate.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
      }
      var ownAv = avColor(assignee);
      var comment = (tm && tm[task.id] && tm[task.id].comment) ? tm[task.id].comment : '';
      // Comment bubble is always rendered (hidden until clicked or if comment exists)
      html += '<div class="task' + (isDone ? ' done' : '') + '" data-empid="' + id + '" data-taskid="' + task.id + '">'
        + '<div class="tcb"><svg class="cksvg" viewBox="0 0 10 8"><polyline points="1,4 3.5,7 9,1"/></svg></div>'
        + '<div style="flex:1;min-width:0">'
        + '<div class="ttxt">' + task.n + '. ' + task.t + '</div>'
        + '<div class="task-meta">'
        + '<div class="task-owner" style="display:flex;align-items:center;gap:4px">'
        + '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;opacity:.5"><circle cx="8" cy="5" r="3" stroke="#1A1917" stroke-width="1.5"/><path d="M2 13c0-3 2-5 6-5s6 2 6 5" stroke="#1A1917" stroke-width="1.5" stroke-linecap="round"/></svg>'
        + '<input class="assign-input" data-empid="' + id + '" data-taskid="' + task.id + '" value="' + assignee + '" placeholder="Assign to..." title="Click to change owner" />'
        + '</div>'
        + '<span class="tag tagl">' + task.tl + '</span>'
        + '<span class="tag tagc">' + task.cat + '</span>'
        + '<span class="task-deadline ' + dlClass + '" title="' + (task.dlOffset !== null && task.dlOffset !== undefined && !tm.deadline && e.doj ? 'Auto-calculated from DOJ' : 'Deadline') + '">'
        + (deadline
            ? dlTxt + (task.dlOffset !== null && task.dlOffset !== undefined && !tm.deadline ? ' <span style="font-size:9px;opacity:.6">(D' + (task.dlOffset < 0 ? task.dlOffset : task.dlOffset === 0 ? '' : '+'+task.dlOffset) + ')</span>' : '')
            + ' <input type="date" class="dl-picker" data-empid="' + id + '" data-taskid="' + task.id + '" value="' + deadline + '" title="Override deadline" style="width:0;opacity:0;position:absolute" />'
            : '<input type="date" class="dl-picker" data-empid="' + id + '" data-taskid="' + task.id + '" value="" title="Set deadline" />')
        + '</span>'
        + '</div>'
        + '<div class="comment-bubble' + (dlClass==='overdue' ? ' overdue-comment' : ' info-comment') + '" id="cbubble_' + id + '_' + task.id + '" style="display:' + (comment ? 'flex' : 'none') + '">'
        + '<textarea class="task-comment" rows="2" data-empid="' + id + '" data-taskid="' + task.id + '" placeholder="Add a comment or note...">' + comment + '</textarea>'
        + '</div>'
        + '<button class="add-comment-btn" id="cbtn_' + id + '_' + task.id + '" data-empid="' + id + '" data-taskid="' + task.id + '" style="' + (comment ? 'display:none' : '') + '">&#128172; add comment</button>'
        + '</div></div></div>';
    }
    html += '</div>';
  }

  document.getElementById("mainArea").innerHTML = html;

  // Wire buttons
  document.getElementById("backBtn").addEventListener("click", function(){ showHome(); });
  document.getElementById("exportEmpBtn").addEventListener("click", function(){ exportEmployee(id); });
  document.getElementById("editBtn").addEventListener("click", function(){ showEditModal(id); });
  document.getElementById("delBtn").addEventListener("click", function(){ deleteEmployee(id); });
  var mr = document.getElementById("metRemaining");
  if (mr) mr.addEventListener("click", function(){ showRemainingPanel(id); });
  var mo = document.getElementById("metOwners");
  if (mo) mo.addEventListener("click", function(){ showOwnersPanel(id); });

  // Wire task checkboxes
  var taskEls = document.querySelectorAll(".task[data-empid]");
  for (var te = 0; te < taskEls.length; te++) {
    taskEls[te].addEventListener("click", function(ev){
      if (ev.target.classList.contains("assign-input") || ev.target.classList.contains("dl-picker") || ev.target.classList.contains("task-comment") || ev.target.classList.contains("add-comment-btn")) return;
      toggleTask(this.getAttribute("data-empid"), this.getAttribute("data-taskid"));
    });
  }
  // Wire add-comment buttons
  var addCommentBtns = document.querySelectorAll(".add-comment-btn");
  for (var ab = 0; ab < addCommentBtns.length; ab++) {
    addCommentBtns[ab].addEventListener("click", function(ev){
      ev.stopPropagation();
      var eid = this.getAttribute("data-empid");
      var tid = this.getAttribute("data-taskid");
      showCommentBox(null, eid, tid);
      this.style.display = "none";
    });
  }
  // Wire comment textareas
  var commentEls = document.querySelectorAll(".task-comment");
  for (var ce = 0; ce < commentEls.length; ce++) {
    commentEls[ce].addEventListener("change", function(ev){
      ev.stopPropagation();
      var eid = this.getAttribute("data-empid");
      var tid = this.getAttribute("data-taskid");
      if (!emps[eid].taskMeta) emps[eid].taskMeta = {};
      if (!emps[eid].taskMeta[tid]) emps[eid].taskMeta[tid] = {};
      emps[eid].taskMeta[tid].comment = this.value.trim();
      saveData();
    });
    commentEls[ce].addEventListener("click", function(ev){ ev.stopPropagation(); });
  }
  // Wire deadline pickers
  var dlPickers = document.querySelectorAll(".dl-picker");
  for (var dp = 0; dp < dlPickers.length; dp++) {
    dlPickers[dp].addEventListener("change", function(ev){
      ev.stopPropagation();
      var eid = this.getAttribute("data-empid");
      var tid = this.getAttribute("data-taskid");
      if (!emps[eid].taskMeta) emps[eid].taskMeta = {};
      if (!emps[eid].taskMeta[tid]) emps[eid].taskMeta[tid] = {};
      emps[eid].taskMeta[tid].deadline = this.value;
      saveData();
      showEmployee(eid);
    });
  }
  // Wire assignee inputs
  var assignInputs = document.querySelectorAll(".assign-input");
  for (var ai = 0; ai < assignInputs.length; ai++) {
    assignInputs[ai].addEventListener("change", function(ev){
      ev.stopPropagation();
      var eid = this.getAttribute("data-empid");
      var tid = this.getAttribute("data-taskid");
      if (!emps[eid].taskMeta) emps[eid].taskMeta = {};
      if (!emps[eid].taskMeta[tid]) emps[eid].taskMeta[tid] = {};
      emps[eid].taskMeta[tid].assignee = this.value.trim();
      saveData();
      showEmployee(eid);
    });
    assignInputs[ai].addEventListener("click", function(ev){ ev.stopPropagation(); });
  }
}

function toggleTask(empId, taskId) {
  if (!emps[empId]) return;
  if (!emps[empId].checks) emps[empId].checks = {};
  emps[empId].checks[taskId] = !emps[empId].checks[taskId];
  saveData();
  showEmployee(empId);
}

function deleteEmployee(id) {
  if (!confirm("Remove this employee? This cannot be undone.")) return;
  delete emps[id];
  saveData();
  selectedId = null;
  showHome();
}

function closeModal() {

}

function renderAddForm(type) {
  var container = document.getElementById("addFormFields");
  var btn = document.getElementById("mConfirm");
  if (!type) { container.innerHTML = ""; btn.style.display = "none"; return; }
  btn.style.display = "";

  var col = TYPE_COLORS[type] || {bg:"#F0EEE9",c:"#1A1917",dot:"#6B6860"};
  var badge = '<div style="display:flex;align-items:center;gap:6px;padding:8px 11px;background:'+col.bg+';border-radius:8px;margin-bottom:12px;font-size:12px;font-weight:500;color:'+col.c+'">'
    + '<div style="width:7px;height:7px;border-radius:50%;background:'+col.dot+'"></div>' + type + '</div>';

  var fields = "";

  if (type === "Local Onboarding") {
    fields = badge
      + fld("mName","Full name *","text","e.g. Priya Sharma",true)
      + fld("mRole","Position / designation *","text","e.g. Analyst",true)
      + fld("mDept","Department *","text","e.g. Finance",true)
      + fld("mDOJ","Date of joining *","date","",true);

  } else if (type === "International Incoming") {
    fields = badge
      + fld("mName","Full name *","text","e.g. Lukas Bauer",true)
      + fld("mRole","Position / designation *","text","e.g. Senior Trader",true)
      + fld("mManager","Manager *","text","e.g. Jan de Vries",true)
      + fld("mTeam","Team *","text","e.g. Equity Derivatives",true)
      + fld("mDOJ","Transfer date *","date","",true)
      + radioFieldWithTextAndDate("mTransferType","Transfer type *",[
          {value:"Temporary Transfer", textId:"mTransferRegionII1", placeholder:"e.g. Netherlands, Amsterdam", hasDate:true},
          {value:"Permanent Transfer", textId:"mTransferRegionII2", placeholder:"e.g. Germany, Frankfurt", hasDate:false}
        ],true);

  } else if (type === "Local Offboarding") {
    fields = badge
      + fld("mName","Full name *","text","e.g. Varun Dumbre",true)
      + fld("mLWD","Last working day *","date","",true)
      + fld("mTermDate","Termination date *","date","",true)
      + toggle("mGardenLeave","Garden leave?","mGardenLeaveRange","Date range")
      + toggle("mNonCompete","Non-compete?","mNonCompeteRange","Date range");

  } else if (type === "International Outgoing") {
    fields = badge
      + fld("mName","Full name *","text","e.g. Priya Sharma",true)
      + fld("mNextRole","Next position *","text","e.g. Head of Trading",true)
      + fld("mNextManager","Next manager *","text","e.g. Sarah Klein",true)
      + fld("mNextTeam","Next team *","text","e.g. Amsterdam Desk",true)
      + fld("mDOJ","Transfer date *","date","",true)
      + radioFieldWithText("mTransferType","Transfer type *",[
          {value:"Return to Home Region", textId:"mTransferRegion1", placeholder:"e.g. Netherlands"},
          {value:"Transfer to Other Region", textId:"mTransferRegion2", placeholder:"e.g. Singapore"}
        ],true);

  } else if (type === "Local Transfer Out") {
    fields = badge
      + fld("mName","Full name *","text","e.g. Priya Sharma",true)
      + fld("mDOJ","Date of transfer *","date","",true)
      + fld("mNextRole","Next position *","text","e.g. Senior Analyst",true)
      + fld("mNextManager","Next manager *","text","e.g. Raj Mehta",true)
      + fld("mNextTeam","Next team *","text","e.g. Mumbai Desk",true)
      + radioFieldWithTextAndDate("mTransferType","Transfer type *",[
          {value:"Temporary", textId:"mTransferRegionLTO1", placeholder:"e.g. Mumbai Desk, India", hasDate:true},
          {value:"Permanent", textId:"mTransferRegionLTO2", placeholder:"e.g. Delhi Office, India", hasDate:false}
        ],true);
  }

  container.innerHTML = fields;

  // Wire garden leave / non-compete toggles + day calculators
  ["mGardenLeave","mNonCompete"].forEach(function(toggleId) {
    var el = document.getElementById(toggleId);
    if (!el) return;
    el.addEventListener("change", function() {
      var rangeId = toggleId + "Range";
      var wrap = document.getElementById(rangeId + "Wrap");
      if (wrap) wrap.style.display = this.checked ? "block" : "none";
    });
    var rangeId = toggleId + "Range";
    var fromEl = document.getElementById(rangeId + "From");
    var toEl   = document.getElementById(rangeId + "To");
    if (fromEl) fromEl.addEventListener("change", function(){ calcDays(rangeId); });
    if (toEl)   toEl.addEventListener("change",   function(){ calcDays(rangeId); });
  });

  // Wire transfer type radio for temporary end date + region text fields
  var radios = document.querySelectorAll("input[name='mTransferType']");
  for (var ri = 0; ri < radios.length; ri++) {
    radios[ri].addEventListener("change", function() {
      // Hide all region text wraps first
      var allWraps = ["mTransferRegion1Wrap","mTransferRegion2Wrap","mTransferRegionII1Wrap","mTransferRegionII2Wrap","mTransferRegionLTO1Wrap","mTransferRegionLTO2Wrap"];
      allWraps.forEach(function(wid) {
        var w = document.getElementById(wid);
        if (w) w.style.display = "none";
      });

      // Show region text for IO transfer types
      var textId = this.getAttribute("data-textid");
      if (textId) {
        var textWrap = document.getElementById(textId + "Wrap");
        if (textWrap) textWrap.style.display = "block";
      }

      // Show temp end date for temporary transfers (mTempEndWrap may be inside option)
      var isTemp = this.value === "Temporary Transfer" || this.value === "Temporary";
      var wrap = document.getElementById("mTempEndWrap");
      if (wrap) wrap.style.display = isTemp ? "block" : "none";
      // For radioFieldWithTextAndDate, the date is always shown when option is selected
      // Wire end date calc
      var endEl = document.getElementById("mTempEnd");
      if (endEl && isTemp) {
        endEl.addEventListener("change", function() {
          var startDate = document.getElementById("mDOJ") ? document.getElementById("mDOJ").value : "";
          calcAssignmentDuration(startDate, this.value);
        });
      }
    });
  }
}

function calcAssignmentDuration(startDate, endDate) {
  var daysEl = document.getElementById("mAssignDays");
  if (!daysEl) return;
  if (!startDate || !endDate) { daysEl.style.display = "none"; return; }
  var d1 = new Date(startDate), d2 = new Date(endDate);
  var days = Math.round((d2 - d1) / 86400000);
  var months = Math.round(days / 30.44);
  daysEl.style.display = "block";
  if (days < 0) {
    daysEl.style.background = "#FEF2F2"; daysEl.style.color = "#DC2626";
    daysEl.textContent = "⚠ End date is before transfer date";
  } else {
    daysEl.style.background = "#E1F5EE"; daysEl.style.color = "#065F46";
    daysEl.textContent = "✓ Assignment duration: " + days + " days (" + months + " month" + (months!==1?"s":"") + ")";
  }
}

function fld(id, label, type, placeholder, required, value) {
  return '<div class="fld"><label>' + label + '</label>'
    + '<input id="' + id + '" type="' + type + '" placeholder="' + placeholder + '"'
    + (value !== undefined && value !== null ? ' value="' + value + '"' : '')
    + (required ? ' data-required="true"' : '') + '/></div>';
}

function calcDays(rangeId) {
  var fromEl = document.getElementById(rangeId + "From");
  var toEl   = document.getElementById(rangeId + "To");
  var daysEl = document.getElementById(rangeId + "Days");
  var hiddenEl = document.getElementById(rangeId);
  if (!fromEl || !toEl || !daysEl || !hiddenEl) return;
  var from = fromEl.value, to = toEl.value;
  if (from && to) {
    var d1 = new Date(from), d2 = new Date(to);
    var days = Math.round((d2 - d1) / 86400000);
    if (days >= 0) {
      daysEl.style.display = "block";
      daysEl.textContent = "✓ " + days + " day" + (days !== 1 ? "s" : "") + "  (" + formatDate(d1) + " – " + formatDate(d2) + ")";
      hiddenEl.value = formatDate(d1) + " – " + formatDate(d2) + " (" + days + " days)";
    } else {
      daysEl.style.display = "block";
      daysEl.style.background = "#FEF2F2";
      daysEl.style.color = "#DC2626";
      daysEl.textContent = "⚠ End date is before start date";
      hiddenEl.value = "";
    }
  } else {
    daysEl.style.display = "none";
    hiddenEl.value = from && !to ? formatDate(new Date(from)) + " – ?" : "";
  }
}

function formatDate(d) {
  return d.toLocaleDateString("en-GB", {day:"numeric", month:"short", year:"numeric"});
}



function addEmp() {
  var type = document.getElementById("mTypeSelect").value;
  if (!type) { alert("Please select a checklist type."); return; }

  // Validate required fields
  var reqFields = document.querySelectorAll("[data-required='true']");
  var missing = [];
  for (var ri = 0; ri < reqFields.length; ri++) {
    var rf = reqFields[ri];
    rf.style.borderColor = "";
    if (!rf.value.trim()) {
      rf.style.borderColor = "#DC2626";
      var lbl = rf.parentElement ? rf.parentElement.querySelector("label") : null;
      missing.push(lbl ? lbl.textContent.replace("*","").trim() : rf.id);
    }
  }

  // Validate radio groups
  var radioGroups = {};
  var allRadios = document.querySelectorAll("input[type='radio']");
  for (var rr = 0; rr < allRadios.length; rr++) {
    var name = allRadios[rr].name;
    if (!radioGroups[name]) radioGroups[name] = false;
    if (allRadios[rr].checked) radioGroups[name] = true;
  }
  for (var grp in radioGroups) {
    if (!radioGroups[grp]) missing.push("Transfer type");
  }

  // Validate temp end date if Temporary selected
  var selectedRadio = document.querySelector("input[name='mTransferType']:checked");
  var isTemp = selectedRadio && (selectedRadio.value === "Temporary Transfer" || selectedRadio.value === "Temporary");
  if (isTemp) {
    var tempEnd = document.getElementById("mTempEnd");
    if (tempEnd && !tempEnd.value) {
      tempEnd.style.borderColor = "#DC2626";
      missing.push("Temporary assignment end date");
    }
  }

  if (missing.length > 0) {
    alert("Please fill in required fields:\n\u2022 " + missing.filter(function(v,i,a){return a.indexOf(v)===i;}).join("\n\u2022 "));
    return;
  }

  var nameEl = document.getElementById("mName");
  var name = nameEl ? nameEl.value.trim() : "";
  if (!name) { alert("Please enter a name."); return; }

  var id = genId();
  var e = { name: name, type: type, checks: {}, taskMeta: {} };

  // Get transfer type
  var transferTypeEl = document.querySelector("input[name='mTransferType']:checked");
  var transferType = transferTypeEl ? transferTypeEl.value : "";

  if (type === "Local Onboarding") {
    e.role = val("mRole"); e.dept = val("mDept"); e.doj = val("mDOJ");

  } else if (type === "International Incoming") {
    e.role = val("mRole"); e.manager = val("mManager"); e.team = val("mTeam");
    e.doj = val("mDOJ"); e.dept = e.team;
    e.transferType = transferType;
    // Capture from-region
    if (transferType === "Temporary Transfer") {
      var iiRegion1 = val("mTransferRegionII1");
      if (iiRegion1) e.fromRegion = iiRegion1;
      e.transferType = "Temporary Transfer" + (iiRegion1 ? " — from " + iiRegion1 : "");
    } else if (transferType === "Permanent Transfer") {
      var iiRegion2 = val("mTransferRegionII2");
      if (iiRegion2) e.fromRegion = iiRegion2;
      e.transferType = "Permanent Transfer" + (iiRegion2 ? " — from " + iiRegion2 : "");
    }
    if (isTemp) {
      e.tempEnd = val("mTempEnd");
      var d1 = new Date(e.doj), d2 = new Date(e.tempEnd);
      var days = Math.round((d2-d1)/86400000);
      e.assignmentDuration = days + " days (" + Math.round(days/30.44) + " months)";
    }

  } else if (type === "Local Offboarding") {
    e.lwd = val("mLWD"); e.doj = e.lwd; e.termDate = val("mTermDate");
    var glEl = document.getElementById("mGardenLeave");
    var ncEl = document.getElementById("mNonCompete");
    e.gardenLeave = (glEl && glEl.checked) ? (val("mGardenLeaveRange") || "Yes") : "No";
    e.nonCompete  = (ncEl && ncEl.checked) ? (val("mNonCompeteRange")  || "Yes") : "No";

  } else if (type === "International Outgoing") {
    e.role = val("mNextRole"); e.nextManager = val("mNextManager");
    e.team = val("mNextTeam"); e.dept = e.team; e.doj = val("mDOJ");
    e.transferType = transferType;
    // Capture region text based on which option was selected
    if (transferType === "Return to Home Region") {
      var region1 = val("mTransferRegion1");
      if (region1) e.transferType = "Return to Home Region — " + region1;
    } else if (transferType === "Transfer to Other Region") {
      var region2 = val("mTransferRegion2");
      if (region2) e.transferType = "Transfer to Other Region — " + region2;
    }

  } else if (type === "Local Transfer Out") {
    e.doj = val("mDOJ"); e.role = val("mNextRole");
    e.nextManager = val("mNextManager"); e.team = val("mNextTeam"); e.dept = e.team;
    e.transferType = transferType;
    if (transferType === "Temporary") {
      var ltoRegion1 = val("mTransferRegionLTO1");
      if (ltoRegion1) e.toRegion = ltoRegion1;
      e.transferType = "Temporary" + (ltoRegion1 ? " — " + ltoRegion1 : "");
    } else if (transferType === "Permanent") {
      var ltoRegion2 = val("mTransferRegionLTO2");
      if (ltoRegion2) e.toRegion = ltoRegion2;
      e.transferType = "Permanent" + (ltoRegion2 ? " — " + ltoRegion2 : "");
    }
    if (isTemp) {
      e.tempEnd = val("mTempEnd");
      var d1b = new Date(e.doj), d2b = new Date(e.tempEnd);
      var daysb = Math.round((d2b-d1b)/86400000);
      e.assignmentDuration = daysb + " days (" + Math.round(daysb/30.44) + " months)";
    }
  }

  emps[id] = e;
  saveData();
  closeModal();
  showToast(name + " added successfully.", "ok");
  showEmployee(id);
}

function esc(v) {
  if (v === null || v === undefined) return "";
  return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function makeTable(rows, headers) {
  var th = "<tr>" + headers.map(function(h){ return "<th style='background:#1A1917;color:#fff;font-weight:bold;padding:6px 10px;border:1px solid #ccc;white-space:nowrap'>" + esc(h) + "</th>"; }).join("") + "</tr>";
  var tr = rows.map(function(row){
    return "<tr>" + row.map(function(cell,ci){
      var bg = ci===row.length-1 && cell==="Done" ? "#E1F5EE" : ci===row.length-1 && cell==="Pending" ? "#FFF7ED" : "";
      return "<td style='padding:5px 10px;border:1px solid #ddd;" + (bg?"background:"+bg+";":"") + "'>" + esc(cell) + "</td>";
    }).join("") + "</tr>";
  }).join("");
  return "<table border='1' style='border-collapse:collapse;font-family:Arial,sans-serif;font-size:12px'>" + th + tr + "</table>";
}
function downloadCSV(filename, rows) {
  var csv = rows.map(function(row) {
    return row.map(function(cell) {
      var s = (cell === null || cell === undefined) ? "" : String(cell);
      if (s.indexOf(",") !== -1 || s.indexOf('"') !== -1 || s.indexOf("\n") !== -1 || s.indexOf("\r") !== -1) {
        s = '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(",");
  }).join("\r\n");

  // Use data URI - works on all browsers, GitHub Pages, Netlify, local files
  var dataUri = "data:text/csv;charset=utf-8," + encodeURIComponent("\uFEFF" + csv);
  var a = document.createElement("a");
  a.setAttribute("href", dataUri);
  a.setAttribute("download", filename);
  a.style.display = "none";
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ document.body.removeChild(a); }, 100);
}

// ── EXPORT: Full Dashboard (all sheets as one file) ───────────────────────────
function exportToExcel() {
  var ids = Object.keys(emps);
  if (!ids.length) { alert("No employee data to export yet."); return; }
  var today = new Date(); today.setHours(0,0,0,0);
  var dateStr = new Date().toISOString().slice(0,10);

  // Build one big CSV with section headers separated by blank lines
  var rows = [];

  // Section: Summary
  rows.push(["IMC HR Ops Dashboard — Export", dateStr]);
  rows.push([]);
  rows.push(["OVERALL SUMMARY"]);
  var totalDone = ids.reduce(function(s,id){ return s+doneCount(emps[id]); },0);
  var totalTasks = ids.reduce(function(s,id){ return s+allTasks(emps[id].type).length; },0);
  rows.push(["Total Employees", ids.length]);
  rows.push(["Tasks Completed", totalDone]);
  rows.push(["Tasks Remaining", totalTasks-totalDone]);
  rows.push(["Overall Progress", (totalTasks?Math.round(totalDone/totalTasks*100):0)+"%"]);
  rows.push([]);
  rows.push(["BY CHECKLIST TYPE"]);
  rows.push(["Type","Employees","Done","Remaining","Progress %"]);
  TYPES.forEach(function(type) {
    var tids=ids.filter(function(id){return emps[id].type===type;});
    var d=tids.reduce(function(s,id){return s+doneCount(emps[id]);},0);
    var tot=tids.reduce(function(s,id){return s+allTasks(type).length;},0);
    rows.push([type,tids.length,d,tot-d,(tot?Math.round(d/tot*100):0)+"%"]);
  });
  rows.push([]);

  // Section: All Employees
  rows.push(["ALL EMPLOYEES"]);
  rows.push(["Name","Role","Department","DOJ","Checklist Type","Done","Total","Progress","Status"]);
  ids.forEach(function(id) {
    var e=emps[id]; var d=doneCount(e); var tot=allTasks(e.type).length; var p=tot?Math.round(d/tot*100):0;
    rows.push([e.name,e.role||"",e.dept||"",e.doj||"",e.type,d,tot,p+"%",p===100?"Completed":p>0?"In Progress":"Not Started"]);
  });
  rows.push([]);

  // Section: Needs Attention
  var attn=ids.filter(function(id){
    var e=emps[id]; if(!e.doj) return false;
    var doj=new Date(e.doj); doj.setHours(0,0,0,0);
    return doj<=today && doneCount(e)<allTasks(e.type).length;
  });
  if (attn.length) {
    rows.push(["NEEDS ATTENTION — DOJ PASSED, TASKS INCOMPLETE"]);
    rows.push(["Name","Role","DOJ","Days Overdue","Type","Tasks","Progress","Status"]);
    attn.forEach(function(id) {
      var e=emps[id]; var doj=new Date(e.doj); doj.setHours(0,0,0,0);
      var over=Math.round((today-doj)/86400000);
      var d=doneCount(e); var tot=allTasks(e.type).length;
      rows.push([e.name,e.role||"",e.doj,over+" days overdue",e.type,d+"/"+tot,Math.round(d/tot*100)+"%","OVERDUE"]);
    });
    rows.push([]);
  }

  // Section: Completed
  var comp=ids.filter(function(id){var tot=allTasks(emps[id].type).length;return doneCount(emps[id])===tot&&tot>0;});
  if (comp.length) {
    rows.push(["COMPLETED EMPLOYEES"]);
    rows.push(["Name","Role","Department","DOJ","Type","Tasks","Status"]);
    comp.forEach(function(id) {
      var e=emps[id]; var tot=allTasks(e.type).length;
      rows.push([e.name,e.role||"",e.dept||"",e.doj||"",e.type,tot+"/"+tot,"Completed"]);
    });
    rows.push([]);
  }

  // Per type breakdown
  TYPES.forEach(function(type) {
    var tids=ids.filter(function(id){return emps[id].type===type;});
    if (!tids.length) return;
    rows.push([type.toUpperCase()]);
    rows.push(["Name","Role","Dept","DOJ","Done","Total","Progress","Status"]);
    tids.forEach(function(id) {
      var e=emps[id]; var d=doneCount(e); var tot=allTasks(type).length; var p=tot?Math.round(d/tot*100):0;
      rows.push([e.name,e.role||"",e.dept||"",e.doj||"",d,tot,p+"%",p===100?"Completed":p>0?"In Progress":"Not Started"]);
    });
    rows.push([]);
  });

  // Per employee checklist
  ids.forEach(function(id) {
    var e=emps[id]; var ch=e.checks||{}; var tm=e.taskMeta||{};
    rows.push([e.name.toUpperCase()+" — "+e.type]);
    rows.push(["Role: "+(e.role||"—"),"Dept: "+(e.dept||"—"),"DOJ: "+(e.doj||"—")]);
    rows.push(["#","Phase","Task","Assigned To","Timeline","Category","Deadline","Status"]);
    CHECKLISTS[e.type].forEach(function(phase) {
      phase.tasks.forEach(function(task) {
        var meta=tm[task.id]||{};
        rows.push([task.n,phase.phase,task.t,meta.assignee||task.own,task.tl,task.cat,meta.deadline||"",ch[task.id]?"Done":"Pending"]);
      });
    });
    var d=doneCount(e); var tot=allTasks(e.type).length;
    rows.push(["","","","","","","Progress:",d+"/"+tot+" ("+(tot?Math.round(d/tot*100):0)+"%)"]);
    rows.push([]);
  });

  downloadCSV("IMC_HR_Dashboard_"+dateStr+".csv", rows);
}
