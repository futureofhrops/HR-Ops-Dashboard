<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMC Onboarding Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F6F3;--sur:#fff;--sur2:#F0EEE9;--bor:#E4E1DA;--bor2:#D0CCC3;--tx:#1A1917;--tx2:#6B6860;--tx3:#9E9B94;--grn:#1D9E75;--gl:#E1F5EE;--gm:#9FE1CB;--blu:#2563EB;--bl:#EFF6FF;--pur:#7C3AED;--pl:#F5F3FF;--red:#DC2626;--rl:#FEF2F2;--r:10px;--rl:14px;--sh:0 1px 3px rgba(0,0,0,.06);--shm:0 4px 16px rgba(0,0,0,.09)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
nav{background:var(--sur);border-bottom:1px solid var(--bor);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.nlogo{width:28px;height:28px;background:var(--tx);border-radius:7px;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.ntitle{font-size:14px;font-weight:600;margin-left:9px}
.nsub{font-size:11px;color:var(--tx3);margin-left:4px}
.nbrand{display:flex;align-items:center}
.nright{display:flex;align-items:center;gap:8px}
.nbadge{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--tx2);background:var(--sur2);border:1px solid var(--bor);padding:4px 10px;border-radius:20px}
.ndot{width:6px;height:6px;border-radius:50%;background:var(--grn)}
.nibtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--bor);background:var(--sur);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:16px;transition:background .15s}
.nibtn:hover{background:var(--sur2)}
.lay{display:grid;grid-template-columns:256px 1fr;min-height:calc(100vh - 54px)}
.sbar{background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column}
.sbh{padding:13px 13px 10px;border-bottom:1px solid var(--bor)}
.sbhr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sblbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em}
.sbcnt{font-size:11px;color:var(--tx3);background:var(--sur2);padding:2px 7px;border-radius:10px}
.srch{width:100%;padding:7px 10px;border:1px solid var(--bor);border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:13px;color:var(--tx);background:var(--bg);outline:none}
.srch::placeholder{color:var(--tx3)}
.eml{flex:1;overflow-y:auto;padding:8px}
.eit{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;transition:background .12s}
.eit:hover,.eit.act{background:var(--sur2)}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.en{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.er{font-size:11px;color:var(--tx3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mb{height:2px;background:var(--bor);border-radius:2px;margin-top:3px;overflow:hidden}
.mf{height:100%;background:var(--grn);border-radius:2px}
.ep{font-size:11px;font-weight:500;color:var(--tx3);flex-shrink:0;font-family:"DM Mono",monospace}
.addbtn{margin:8px;padding:10px;border:1px dashed var(--bor2);border-radius:var(--r);background:none;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.addbtn:hover{background:var(--sur2);color:var(--tx)}
.main{padding:22px;overflow-y:auto}

/* HOME DASHBOARD */
.hometitle{font-size:20px;font-weight:600;margin-bottom:3px}
.homesub{font-size:13px;color:var(--tx2);margin-bottom:20px}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:22px}
.statcard{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rl);padding:16px;box-shadow:var(--sh)}
.statlbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.statval{font-size:30px;font-weight:600;font-family:"DM Mono",monospace;color:var(--tx)}
.statval.grn{color:var(--grn)}
.statbar{height:4px;background:var(--sur2);border-radius:2px;overflow:hidden;margin-top:8px}
.statbarfill{height:100%;background:var(--grn);border-radius:2px}
.sectlbl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.typegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:22px}
.typecard{border-radius:var(--rl);padding:14px;border:1px solid transparent}
.typecname{font-size:12px;font-weight:600;margin-bottom:8px}
.typecval{font-size:26px;font-weight:700;font-family:"DM Mono",monospace;margin-bottom:2px}
.typecmeta{font-size:11px;opacity:.7;margin-bottom:8px}
.typecbar{height:3px;border-radius:2px;overflow:hidden}
.typecbarfill{height:100%;border-radius:2px}
.emptable{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.emptable table{width:100%;border-collapse:collapse;font-size:13px}
.emptable th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;background:var(--sur2);border-bottom:1px solid var(--bor)}
.emptable td{padding:10px 14px;border-bottom:1px solid var(--bor)}
.emptable tr:last-child td{border-bottom:none}
.emptable tr:hover td{background:var(--sur2);cursor:pointer}
.typepill{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.tpbar{display:flex;align-items:center;gap:7px}
.tpbartrack{flex:1;height:4px;background:var(--sur2);border-radius:2px;overflow:hidden;min-width:60px}
.tpbarfill{height:100%;background:var(--grn);border-radius:2px}
.tppct{font-size:11px;font-weight:600;color:var(--grn);font-family:"DM Mono",monospace;min-width:30px}

/* EMP DETAIL */
.ehdr{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rl);padding:18px;margin-bottom:14px;box-shadow:var(--sh)}
.ehrow{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.avlg{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.ename{font-size:16px;font-weight:600}
.emeta{font-size:12px;color:var(--tx2);margin-top:3px}
.eacts{display:flex;gap:7px;flex-wrap:wrap;margin-left:auto}
.hbtn{padding:6px 11px;border:1px solid var(--bor);border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:var(--sur);color:var(--tx2);display:flex;align-items:center;gap:4px;transition:all .15s;text-decoration:none}
.hbtn:hover{background:var(--sur2);color:var(--tx)}
.hbtn.jira{background:var(--bl);color:var(--blu);border-color:#BFDBFE}
.hbtn.jira:hover{background:#DBEAFE}
.hbtn.back{background:var(--sur2);border-color:var(--bor2)}
.hbtn.danger{color:var(--red);border-color:#FECACA}
.hbtn.danger:hover{background:var(--rl)}
.mets{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:7px;margin-bottom:12px}
.met{background:var(--bg);border-radius:var(--r);padding:9px 11px}
.metl{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.metv{font-size:18px;font-weight:600;font-family:"DM Mono",monospace}
.metv.grn{color:var(--grn)}
.ptrak{height:4px;background:var(--sur2);border-radius:3px;overflow:hidden;margin-bottom:4px}
.pbar{height:100%;background:var(--grn);border-radius:3px;transition:width .4s}
.plbl{font-size:11px;color:var(--tx3);font-family:"DM Mono",monospace}
.cltype{display:flex;align-items:center;gap:8px;margin-bottom:13px;padding:9px 12px;border-radius:var(--r);font-size:13px;font-weight:500}
.phase{margin-bottom:18px}
.phdr{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid var(--bor)}
.phnm{font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em}
.phprog{flex:1;height:3px;background:var(--bor);border-radius:2px;overflow:hidden;max-width:70px}
.phprogf{height:100%;background:var(--grn);border-radius:2px}
.phct{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--sur2);color:var(--tx3);font-family:"DM Mono",monospace}
.task{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;transition:background .1s}
.task:hover{background:var(--sur2)}
.task.dn{opacity:.45}
.tcb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--bor2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;background:var(--sur);transition:all .15s}
.task.dn .tcb{background:var(--grn);border-color:var(--grn)}
.ck{width:10px;height:10px;stroke:#fff;stroke-width:2.5;fill:none;display:none}
.task.dn .ck{display:block}
.tt{font-size:13px;color:var(--tx);line-height:1.45}
.task.dn .tt{text-decoration:line-through;color:var(--tx3)}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.tago{background:var(--bl);color:var(--blu)}
.tagl{background:var(--gl);color:#065F46}
.tagc{background:var(--pl);color:var(--pur)}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.mov.op{display:flex}
.mod{background:var(--sur);border-radius:var(--rl);padding:22px;width:100%;max-width:410px;box-shadow:var(--shm);animation:su .2s ease}
@keyframes su{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.modtitle{font-size:15px;font-weight:600;margin-bottom:16px}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:4px}
.fld input,.fld select{width:100%;padding:8px 11px;border:1px solid var(--bor);border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:13px;color:var(--tx);background:var(--sur);outline:none}
.ibox{border-radius:var(--r);padding:10px 12px;margin-bottom:11px;font-size:12px;line-height:1.5}
.ibox.blue{background:var(--bl);border:1px solid #BFDBFE;color:#1E40AF}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mbtn{padding:8px 15px;border:1px solid var(--bor);border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:var(--sur);color:var(--tx2);transition:all .15s}
.mbtn:hover{background:var(--sur2)}
.mbtn.pri{background:var(--tx);color:#fff;border-color:var(--tx)}
.mbtn.pri:hover{background:#2d2c2a}
.mbtn:disabled{opacity:.5;cursor:not-allowed}

/* TOASTS */
#toasts{position:fixed;bottom:18px;right:18px;z-index:300;display:flex;flex-direction:column;gap:7px}
.toast{padding:11px 15px;border-radius:var(--r);font-size:13px;box-shadow:var(--shm);display:flex;align-items:flex-start;gap:8px;animation:ti .2s ease;max-width:340px;line-height:1.4}
@keyframes ti{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.ok{background:var(--gl);color:#065F46;border:1px solid var(--gm)}
.toast.err{background:var(--rl);color:#991B1B;border:1px solid #FECACA}
.toast.inf{background:var(--bl);color:#1E40AF;border:1px solid #BFDBFE}
.spin{display:inline-block;width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;margin-top:1px}
@keyframes sp{to{transform:rotate(360deg)}}
a.jlnk{color:var(--blu);text-decoration:none}
a.jlnk:hover{text-decoration:underline}
.empty{padding:20px;text-align:center;font-size:12px;color:var(--tx3)}
</style>
</head>

    <span class="ntitle">Onboarding Tracker</span>

  </div>

</nav>

</div>

<div class="mov" id="modal"><div class="mod" id="modinner"></div></div>

const PAL=[{bg:"#EFF6FF",c:"#1D4ED8"},{bg:"#F0FDF4",c:"#15803D"},{bg:"#FDF4FF",c:"#7E22CE"},{bg:"#FFF7ED",c:"#C2410C"},{bg:"#FFF1F2",c:"#BE123C"},{bg:"#F0FDFA",c:"#0F766E"}];
let emps={},sel=null,qry="";
const SK="obt_imc_v2";

function load(){try{const s=localStorage.getItem(SK);if(s)emps=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(emps));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function inits(n){return n.trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"?";}
function pal(id){let h=0;for(const c of id)h=(h*31+c.charCodeAt(0))&0xfffffff;return PAL[h%PAL.length];}
function tks(type){return CL[type].phases.flatMap(p=>p.tasks);}
function dn(e){const ch=e.checks||{};return tks(e.type).filter(t=>ch[t.id]).length;}
function pct(e){const tot=tks(e.type).length;return tot?Math.round(dn(e)/tot*100):0;}

function toast(msg,type,dur){
  const el=document.createElement("div");
  el.className="toast "+type;
  el.innerHTML='<span>'+(type==="ok"?"&#10003;":type==="err"?"&#10005;":"&#8505;")+'</span><span>'+msg+'</span>';
  document.getElementById("toasts").appendChild(el);
  setTimeout(()=>el.remove(),dur||4500);
}

async function jFetch(path,method,body){
  const r=await fetch("https://"+JS+"/rest/api/3/"+path,{method,headers:{"Authorization":"Basic "+btoa(JE+":"+JT),"Content-Type":"application/json","Accept":"application/json"},body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

async function createJira(e){
  const key=("IMC"+e.name.replace(/[^A-Za-z]/g,"").toUpperCase().slice(0,3)+Date.now().toString(36).slice(-2)).slice(0,10);
  toast("Creating Jira project for "+e.name+"...","inf",20000);
  const proj=await jFetch("project","POST",{key,name:e.name+" - "+e.type,projectTypeKey:"software",projectTemplateKey:"com.pyxis.greenhopper.jira:gh-simplified-agility-scrum",description:"Onboarding checklist for "+e.name+". Type: "+e.type+". DOJ: "+(e.doj||"TBD")});
  const pk=proj.key;
  for(const phase of CL[e.type].phases){
    for(const task of phase.tasks){
      await jFetch("issue","POST",{fields:{project:{key:pk},summary:"["+phase.name+"] "+task.n+". "+task.t,description:{type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:"Owner: "+task.own+"\nTimeline: "+task.tl+"\nCategory: "+task.cat}]}]},issuetype:{name:"Task"},labels:[task.own.replace(/[\s\/]+/g,"_"),task.cat.replace(/\s+/g,"_")]}});
    }
  }
  return{key:pk,url:"https://"+JS+"/jira/software/projects/"+pk+"/boards"};
}

    ?'<a href="'+e.jiraUrl+'" target="_blank" class="hbtn jira">&#11043; Open in Jira</a>'

function toggle(id,tid){
  if(!emps[id])return;
  if(!emps[id].checks)emps[id].checks={};
  emps[id].checks[tid]=!emps[id].checks[tid];
  save();renderSidebar();selectEmp(id);
}

async function retryJira(id){
  const e=emps[id];if(!e)return;
  try{
    const{key,url}=await createJira(e);
    e.jiraProjKey=key;e.jiraUrl=url;save();
    toast('Jira project '+key+' created! <a href="'+url+'" target="_blank" class="jlnk">Open &#8599;</a>','ok',8000);
    selectEmp(id);
  }catch(err){toast('Jira error: '+err.message,'err',8000);}
}

  const e=emps[id];if(!e)return;
  document.getElementById("modinner").innerHTML=
    '<div class="modtitle">Edit employee</div>'
    +'<div class="fld"><label>Full name *</label><input id="mn" value="'+e.name+'"/></div>'
    +'<div class="fld"><label>Role / designation</label><input id="mr" value="'+(e.role||'')+'"/></div>'
    +'<div class="fld"><label>Department</label><input id="md" value="'+(e.dept||'')+'"/></div>'
    +'<div class="fld"><label>Date of joining</label><input id="mdoj" type="date" value="'+(e.doj||'')+'"/></div>'
    +'<div class="mbtns"><button class="mbtn" onclick="closeMod()">Cancel</button>'
    +'<button class="mbtn pri" onclick="saveEdit(\''+id+'\')">Save changes</button></div>';
  document.getElementById("modal").classList.add("op");
}

async function addEmp(){
  const name=document.getElementById("mn").value.trim();if(!name)return;
  const btn=document.getElementById("addsub");
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Creating Jira project...';
  const id=uid();
  const e={name,role:document.getElementById("mr").value.trim(),dept:document.getElementById("md").value.trim(),doj:document.getElementById("mdoj").value,type:document.getElementById("mt").value,checks:{},jiraProjKey:null,jiraUrl:null};
  emps[id]=e;
  try{
    const{key,url}=await createJira(e);
    e.jiraProjKey=key;e.jiraUrl=url;
    toast('Jira project '+key+' created! <a href="'+url+'" target="_blank" class="jlnk">Open &#8599;</a>','ok',8000);
  }catch(err){toast('Employee added but Jira failed: '+err.message,'err',8000);}
  save();closeMod();sel=id;renderSidebar();selectEmp(id);renderSidebar();
}

function saveEdit(id){
  const name=document.getElementById("mn").value.trim();if(!name)return;
  Object.assign(emps[id],{name,role:document.getElementById("mr").value.trim(),dept:document.getElementById("md").value.trim(),doj:document.getElementById("mdoj").value});
  save();closeMod();renderSidebar();selectEmp(id);
}

function delEmp(id){
  if(!confirm('Remove this employee? Their Jira project will remain on imcfm.atlassian.net.'))return;
  delete emps[id];if(sel===id)sel=null;save();renderSidebar();renderHome();
}

function closeMod(){document.getElementById("modal").classList.remove("op");}
document.getElementById("modal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeMod();});

load();
renderSidebar();
renderHome();
// Show Jira badge only when hosted (not local file)
if(location.protocol!=='file:'){
  document.getElementById('jstatus').style.display='flex';
}
</script>
</body>
</html>
